<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saf Queue — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a0f1e;
    --surface: #111827;
    --border:  #1e2d47;
    --accent:  #6366f1;
    --accent2: #22d3ee;
    --green:   #10b981;
    --red:     #ef4444;
    --amber:   #f59e0b;
    --text:    #f1f5f9;
    --muted:   #64748b;
    --card:    #141d2e;
    --radius:  14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
    pointer-events: none;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; position: relative;
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px; width: 100%; max-width: 360px;
  }
  .login-box h1 { font-size: 22px; margin-bottom: 6px; }
  .login-box p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* ── DASHBOARD ── */
  #dash { display: none; position: relative; }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,15,30,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar span { color: var(--muted); font-size: 13px; }

  .content { padding: 24px; max-width: 1100px; margin: 0 auto; }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .stat-card .val { font-family: 'JetBrains Mono', monospace; font-size: 32px; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

  /* ── ADD SHOP FORM ── */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
  }
  .add-form {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;
  }
  .add-form input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .add-form input:focus { border-color: var(--accent); }
  .add-form input::placeholder { color: var(--muted); }

  /* ── SHOP TABLE ── */
  .shop-table {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .table-header {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr 1fr 1.5fr;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .shop-row {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr 1fr 1.5fr;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    align-items: center; transition: background 0.15s;
  }
  .shop-row:last-child { border-bottom: none; }
  .shop-row:hover { background: rgba(99,102,241,0.04); }
  .shop-name { font-weight: 600; font-size: 14px; }
  .shop-phone { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 600; border: 1px solid; width: fit-content;
  }
  .badge.active   { background: rgba(16,185,129,0.1);  border-color: var(--green);  color: var(--green); }
  .badge.inactive { background: rgba(239,68,68,0.1);   border-color: var(--red);    color: var(--red); }
  .badge.free     { background: rgba(100,116,139,0.1); border-color: var(--muted);  color: var(--muted); }
  .badge.basic    { background: rgba(99,102,241,0.1);  border-color: var(--accent); color: #818cf8; }
  .badge.pro      { background: rgba(34,211,238,0.1);  border-color: var(--accent2);color: var(--accent2); }

  /* ── BUTTONS ── */
  .btn {
    padding: 9px 16px; border: none; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: inline-flex;
    align-items: center; gap: 6px;
  }
  .btn-primary  { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.35); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  .btn-green  { background: rgba(16,185,129,0.15);  color: var(--green);  border: 1px solid var(--green); }
  .btn-red    { background: rgba(239,68,68,0.15);   color: var(--red);    border: 1px solid var(--red); }
  .btn-amber  { background: rgba(245,158,11,0.15);  color: var(--amber);  border: 1px solid var(--amber); }
  .btn-ghost  { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn:disabled { opacity: 0.4; pointer-events: none; }

  .action-group { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── PLAN SELECT ── */
  .plan-select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 12px;
    padding: 5px 8px; border-radius: 6px; outline: none;
  }

  /* ── FORM FIELDS ── */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 100%; max-width: 420px;
  }
  .modal h3 { font-size: 18px; margin-bottom: 20px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-size: 13px; font-weight: 500; z-index: 999;
    transition: transform 0.3s; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { color: var(--green); border-color: var(--green); }
  #toast.error   { color: var(--red);   border-color: var(--red); }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .loading-row { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animated { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen">
  <div class="login-box animated">
    <h1>🔐 Admin Panel</h1>
    <p>Saf Queue — Restricted Access</p>
    <div class="field">
      <label>Admin Secret</label>
      <input id="admin-secret-input" type="password" placeholder="Enter admin secret"/>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">Login</button>
    <div style="color:var(--red);font-size:13px;margin-top:12px;text-align:center" id="login-err"></div>
  </div>
</div>

<!-- ═══════════════ DASHBOARD ═══════════════ -->
<div id="dash">

  <div class="topbar">
    <div>
      <h1>⚡ Saf Queue Admin</h1>
      <span id="last-updated">Loading...</span>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost btn-sm" onclick="loadShops()">🔄 Refresh</button>
      <button class="btn btn-ghost btn-sm" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="val" id="stat-total">—</div>
        <div class="lbl">Total Shops</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-active" style="color:var(--green)">—</div>
        <div class="lbl">Active</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-inactive" style="color:var(--red)">—</div>
        <div class="lbl">Inactive</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-free" style="color:var(--muted)">—</div>
        <div class="lbl">Free Plan</div>
      </div>
    </div>

    <!-- Add Shop -->
    <div class="section">
      <div class="section-title">➕ Add New Shop</div>
      <div class="add-form">
        <input id="f-name"    placeholder="Shop name *"/>
        <input id="f-phone"   placeholder="Phone (923001234567) *" type="tel"/>
        <input id="f-pin"     placeholder="4-digit PIN *" type="number" maxlength="4"/>
        <input id="f-cat"     placeholder="Category (barber, clinic...)"/>
        <input id="f-area"    placeholder="Area / City"/>
        <button class="btn btn-primary" onclick="addShop()">Add Shop</button>
      </div>
    </div>

    <!-- Shop List -->
    <div class="section">
      <div class="section-title">🏪 All Shops</div>
      <div class="shop-table">
        <div class="table-header">
          <span>Shop</span>
          <span>Phone</span>
          <span>Status</span>
          <span>Plan</span>
          <span>Expiry</span>
          <span>Tokens</span>
          <span>Actions</span>
        </div>
        <div id="shop-list">
          <div class="loading-row">Loading shops...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════ ASSIGN PLAN MODAL ═══════════════ -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <h3>💎 Assign Plan</h3>
    <div class="field">
      <label>Shop</label>
      <input id="modal-shop-name" readonly style="opacity:0.6"/>
    </div>
    <div class="field">
      <label>Select Plan</label>
      <select id="modal-plan" class="plan-select" style="width:100%;padding:11px 14px;font-size:14px">
        <option value="free">Free (30 days)</option>
        <option value="basic">Basic — Rs.999/month</option>
        <option value="pro">Pro — Rs.2499/month</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="confirmAssignPlan()">Assign</button>
      <button class="btn btn-ghost"   style="flex:1" onclick="closePlanModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const WORKER = 'https://saf-queue-worker.byker-software.workers.dev';
let ADMIN_SECRET = '';
let shops = [];
let selectedShopId = null;

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function adminLogin() {
  const secret = document.getElementById('admin-secret-input').value.trim();
  if (!secret) return;
  ADMIN_SECRET = secret;

  // Test with a real API call
  api('GET', '/admin/shops')
    .then(() => {
      localStorage.setItem('admin_secret', secret);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadShops();
    })
    .catch(() => {
      document.getElementById('login-err').textContent = 'Wrong secret. Try again.';
      ADMIN_SECRET = '';
    });
}

function adminLogout() {
  localStorage.removeItem('admin_secret');
  ADMIN_SECRET = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dash').style.display = 'none';
}

// ══════════════════════════════════════
// LOAD SHOPS
// ══════════════════════════════════════
async function loadShops() {
  document.getElementById('shop-list').innerHTML = '<div class="loading-row">Loading...</div>';

  try {
    const { data } = await api('GET', '/admin/shops');
    shops = data;

    // Load subscriptions for each shop
    const subs = await Promise.allSettled(
      shops.map(s => api('GET', `/subscriptions?shop_id=${s.id}`))
    );

    shops = shops.map((s, i) => ({
      ...s,
      sub: subs[i].status === 'fulfilled' ? subs[i].value.data : null
    }));

    updateStats();
    renderShops();

    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('shop-list').innerHTML =
      `<div class="empty">Error loading shops: ${err.message}</div>`;
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent    = shops.length;
  document.getElementById('stat-active').textContent   = shops.filter(s => s.is_active).length;
  document.getElementById('stat-inactive').textContent = shops.filter(s => !s.is_active).length;
  document.getElementById('stat-free').textContent     = shops.filter(s => !s.sub || s.sub.plan_name === 'free').length;
}

function renderShops() {
  const el = document.getElementById('shop-list');
  if (!shops.length) {
    el.innerHTML = '<div class="empty">Koi dukan nahi mili</div>';
    return;
  }

  el.innerHTML = shops.map((s, i) => {
    const plan    = s.sub?.plan_name ?? 'free';
    const expiry  = s.sub?.end_date  ?? '—';
    const active  = s.is_active;

    return `
    <div class="shop-row animated" style="animation-delay:${i*0.04}s">
      <div>
        <div class="shop-name">${esc(s.name)}</div>
        <div class="shop-phone">${esc(s.area ?? '')} ${esc(s.category ?? '')}</div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">${esc(s.owner_phone)}</div>
      <div><span class="badge ${active ? 'active' : 'inactive'}">${active ? '● Active' : '● Inactive'}</span></div>
      <div><span class="badge ${plan}">${plan.toUpperCase()}</span></div>
      <div style="font-size:12px;color:var(--muted)">${expiry}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px">${s.current_token}</div>
      <div class="action-group">
        <button class="btn btn-sm btn-amber" onclick="openPlanModal('${s.id}','${esc(s.name)}')">Plan</button>
        <button class="btn btn-sm ${active ? 'btn-red' : 'btn-green'}" 
          onclick="toggleActive('${s.id}', ${!active})">
          ${active ? 'Deactivate' : 'Activate'}
        </button>
        <button class="btn btn-sm btn-red" onclick="deleteShop('${s.id}','${esc(s.name)}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
// ADD SHOP
// ══════════════════════════════════════
async function addShop() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const pin   = document.getElementById('f-pin').value.trim();
  const cat   = document.getElementById('f-cat').value.trim();
  const area  = document.getElementById('f-area').value.trim();

  if (!name || !phone || !pin) return showToast('Name, phone aur PIN required', 'error');
  if (pin.length !== 4)        return showToast('PIN 4 digits ka hona chahiye', 'error');

  try {
    await api('POST', '/shops', { name, owner_phone: phone, pin, category: cat, area });
    showToast(`✅ ${name} add ho gaya! 30 din ka free trial shuru.`, 'success');
    // Clear form
    ['f-name','f-phone','f-pin','f-cat','f-area'].forEach(id =>
      document.getElementById(id).value = '');
    loadShops();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════
// ASSIGN PLAN MODAL
// ══════════════════════════════════════
function openPlanModal(shopId, shopName) {
  selectedShopId = shopId;
  document.getElementById('modal-shop-name').value = shopName;
  document.getElementById('plan-modal').classList.add('show');
}

function closePlanModal() {
  document.getElementById('plan-modal').classList.remove('show');
  selectedShopId = null;
}

async function confirmAssignPlan() {
  const plan = document.getElementById('modal-plan').value;
  try {
    await api('POST', '/admin/assign-plan', { shop_id: selectedShopId, plan_name: plan });
    showToast(`✅ Plan "${plan}" assign ho gaya!`, 'success');
    closePlanModal();
    loadShops();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════
// TOGGLE ACTIVE
// ══════════════════════════════════════
async function toggleActive(shopId, newState) {
  try {
    await api('PATCH', `/admin/shops/${shopId}/activate`, { is_active: newState });
    showToast(newState ? '✅ Shop activate ho gaya' : '🔴 Shop deactivate ho gaya',
      newState ? 'success' : '');
    loadShops();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════
// DELETE SHOP
// ══════════════════════════════════════
async function deleteShop(shopId, shopName) {
  if (!confirm(`"${shopName}" ko permanently delete karna chahte hain? Ye wapas nahi aayega.`)) return;
  try {
    await api('DELETE', `/admin/shops/${shopId}`);
    showToast(`🗑️ ${shopName} delete ho gaya`, 'success');
    loadShops();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type':   'application/json',
      'x-admin-secret': ADMIN_SECRET,
    },
  };
  if (body) opts.body = JSON.stringify(body);

  const res  = await fetch(WORKER + path, opts);
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Error');
  return data;
}

function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
(function boot() {
  const saved = localStorage.getItem('admin_secret');
  if (saved) {
    ADMIN_SECRET = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadShops();
  }

  // Enter key on login
  document.getElementById('admin-secret-input')
    .addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
})();
</script>
</body>
</html>
