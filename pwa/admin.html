<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080c14"/>
<title>WaitMate — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080c14; --bg2:#0d1422; --surface:#111827;
  --glass:rgba(17,24,39,0.7); --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --gold:#E8B84B; --gold2:#F5CC6A; --cyan:#38BDF8;
  --green:#34D399; --red:#F87171; --amber:#FBBF24;
  --text:#F1F5F9; --text2:#94A3B8; --text3:#475569; --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(232,184,75,0.05) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(56,189,248,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

/* ── LOGIN ── */
#login-screen{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{width:100%;max-width:380px;background:var(--glass);border:1px solid var(--border);border-radius:18px;padding:28px 24px;backdrop-filter:blur(20px);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6;}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(232,184,75,0.2),rgba(232,184,75,0.05));border:1px solid rgba(232,184,75,0.3);display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
.login-logo h1{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--text);margin-bottom:3px;}
.login-logo p{font-size:12px;color:var(--text2);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase;}
.field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;direction:ltr;}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,0.1);}
.field input::placeholder{color:var(--text3);}
.btn-primary{width:100%;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d1422;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(232,184,75,0.3);}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

/* ── DASHBOARD ── */
#dash{display:none;position:relative;z-index:1;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,rgba(232,184,75,0.2),rgba(232,184,75,0.05));border:1px solid rgba(232,184,75,0.3);display:flex;align-items:center;justify-content:center;font-size:15px;}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:-0.01em;}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar-actions{display:flex;gap:8px;}
.btn-ghost{padding:7px 14px;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{padding:7px 14px;border:1px solid rgba(248,113,113,0.3);border-radius:100px;background:transparent;color:var(--red);font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:rgba(248,113,113,0.08);}

.content{padding:20px;max-width:1100px;margin:0 auto;}

@media (max-width: 600px) {
  .content { padding: 10px 8px; }
  #login-screen { padding: 16px; }
  .shop-table { font-size: 11px; }
  .shop-table th, .shop-table td { padding: 6px 6px; }
  .btn-xs { padding: 4px 7px; font-size: 10px; }
  .card { padding: 12px; }
  .topbar { padding: 10px 12px; }
  .topbar h1 { font-size: 16px; }
}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.stat-box{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:16px;backdrop-filter:blur(16px);}
.stat-box .val{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;line-height:1;margin-bottom:5px;}
.stat-box .lbl{font-size:11px;color:var(--text2);font-weight:500;}

/* Section */
.section{margin-bottom:20px;}
.section-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;font-family:'Sora',sans-serif;}

/* Add shop form */
.add-form{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:18px;backdrop-filter:blur(16px);display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.add-form input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;transition:border-color .2s;direction:ltr;}
.add-form input:focus{border-color:var(--gold);}
.add-form input::placeholder{color:var(--text3);}

/* Table */
.table-wrap{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;backdrop-filter:blur(16px);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-head{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 1.8fr;padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.table-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1fr 1.8fr;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;animation:rowIn .3s ease both;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:rgba(255,255,255,0.02);}
@keyframes rowIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.shop-name{font-size:14px;font-weight:600;color:var(--text);}
.shop-detail{font-size:11px;color:var(--text3);margin-top:2px;}
.shop-phone{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid;letter-spacing:.03em;}
.badge.active{background:rgba(52,211,153,0.1);border-color:var(--green);color:var(--green);}
.badge.inactive{background:rgba(248,113,113,0.1);border-color:var(--red);color:var(--red);}
.badge.free{background:rgba(100,116,139,0.1);border-color:var(--text3);color:var(--text3);}
.badge.basic{background:rgba(56,189,248,0.1);border-color:var(--cyan);color:var(--cyan);}
.badge.pro{background:rgba(232,184,75,0.1);border-color:var(--gold);color:var(--gold);}

/* Action buttons */
.action-group{display:flex;gap:5px;flex-wrap:wrap;}
.btn-xs{padding:5px 10px;border-radius:6px;font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid;background:transparent;}
.btn-xs:hover{transform:translateY(-1px);}
.btn-xs.plan{border-color:rgba(232,184,75,0.4);color:var(--gold);}
.btn-xs.plan:hover{background:rgba(232,184,75,0.08);}
.btn-xs.on{border-color:rgba(52,211,153,0.4);color:var(--green);}
.btn-xs.on:hover{background:rgba(52,211,153,0.08);}
.btn-xs.off{border-color:rgba(248,113,113,0.4);color:var(--red);}
.btn-xs.off:hover{background:rgba(248,113,113,0.08);}
.btn-xs.link{border-color:rgba(56,189,248,0.4);color:var(--cyan);}
.btn-xs.link:hover{background:rgba(56,189,248,0.08);}
.btn-xs.del{border-color:var(--border);color:var(--text3);}
.btn-xs.del:hover{border-color:var(--red);color:var(--red);}

/* Registrations */
.reg-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1.5fr;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
.reg-row:last-child{border-bottom:none;}
.reg-head{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1.5fr;padding:10px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;padding:22px 20px 30px;width:100%;max-width:440px;animation:sheetUp .3s cubic-bezier(0.16,1,0.3,1) both;position:relative;}
.modal-sheet::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:32px;height:4px;border-radius:100px;background:var(--border2);}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;margin-top:10px;letter-spacing:-0.01em;}
.modal-close{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;margin-bottom:14px;}
.modal-select:focus{border-color:var(--gold);}
.modal-select option{background:var(--bg2);}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--border2);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(0.16,1,0.3,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);cursor:pointer;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{color:var(--green);border-color:rgba(52,211,153,0.3);}
#toast.error{color:var(--red);border-color:rgba(248,113,113,0.3);}

.empty-row{text-align:center;padding:36px;color:var(--text3);font-size:13px;}
.loading-row{text-align:center;padding:24px;color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <h1 style="font-family:Orbitron,monospace;font-size:20px;font-weight:900;background:linear-gradient(135deg,#e8b84b,#c9a227);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0">WaitMate</h1>
      <p>Admin Dashboard</p>
    </div>
    <div class="field">
      <label>Admin Secret</label>
      <input id="secret-input" type="password" placeholder="Enter your admin secret" autocomplete="off"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In as Admin</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dash">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-icon">⚡</div>
      <div>
        <div class="topbar-title">Admin Dashboard</div>
        <div class="topbar-sub" id="last-updated">Loading...</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn-ghost" onclick="loadAll()">↺ Refresh</button>
      <button class="btn-ghost" onclick="window.location.href='/'">← App</button>
      <button class="btn-danger" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box"><div class="val" id="s-total">—</div><div class="lbl">Total Shops</div></div>
      <div class="stat-box"><div class="val" id="s-active" style="color:var(--green)">—</div><div class="lbl">Active</div></div>
      <div class="stat-box"><div class="val" id="s-inactive" style="color:var(--red)">—</div><div class="lbl">Inactive</div></div>
      <div class="stat-box"><div class="val" id="s-free" style="color:var(--text2)">—</div><div class="lbl">Free Plan</div></div>
    </div>

    <!-- Add Shop -->
    <div class="section">
      <div class="section-title">Add New Shop</div>
      <div class="add-form">
        <input id="f-name"  placeholder="Shop name *"/>
        <input id="f-phone" placeholder="Phone (923001234567) *" type="tel"/>
        <input id="f-pin"   placeholder="4-digit PIN *" type="number"/>
        <input id="f-cat"   placeholder="Category (barber, clinic...)"/>
        <input id="f-area"  placeholder="Area / City"/>
        <button class="btn-primary" style="padding:9px" onclick="addShop()">Add Shop</button>
      </div>
    </div>

    <!-- Shops Table -->
    <div class="section">
      <div class="section-title">All Shops</div>
      <div class="table-wrap">
        <div class="table-head">
          <span>Shop</span><span>Phone</span><span>Status</span><span>Plan</span><span>Expiry</span><span>Actions</span>
        </div>
        <div id="shop-list"><div class="loading-row">Loading shops...</div></div>
      </div>
    </div>

    <!-- PATCH 5: Quick add city/area -->
    <div class="section">
      <div class="section-title">📍 Add City / Area</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px">City</label>
          <input id="new-city-input" type="text" placeholder="e.g. Attock" style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;box-sizing:border-box"/>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px">Area</label>
          <input id="new-area-input" type="text" placeholder="e.g. Saddar, Rwp" style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;box-sizing:border-box"/>
        </div>
      </div>
      <button onclick="addLocation()" style="padding:8px 20px;background:var(--gold);color:#0d1422;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">+ Add Location</button>
      <span id="location-msg" style="font-size:12px;margin-left:10px"></span>
    </div>

    <!-- Pending Registrations -->
    <div class="section" id="pending-section">
      <div class="section-title" style="display:flex;align-items:center;gap:8px">
        Pending Registrations
        <span id="pending-badge" style="font-size:11px;padding:2px 8px;border-radius:100px;background:rgba(251,191,36,.2);color:#fbbf24;font-weight:700"></span>
      </div>
      <div id="reg-list"><div class="loading-row">Loading...</div></div>
    </div>

  </div>
</div>

<!-- Plan Modal -->
<div class="modal-overlay" id="plan-modal" onclick="handlePlanOverlay(event)">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closePlanModal()">✕</button>
    <div class="modal-title">Assign Plan</div>
    <div class="field" style="margin-bottom:10px">
      <label>Shop</label>
      <input id="modal-shop-name" readonly style="opacity:.6"/>
    </div>
    <select id="modal-plan" class="modal-select">
      <option value="free">Free — 30 days</option>
      <option value="basic">Basic — Rs.999/month</option>
      <option value="pro">Pro — Rs.2,499/month</option>
    </select>
    <button class="btn-primary" onclick="confirmPlan()">Assign Plan</button>
  </div>
</div>

<div id="toast" onclick="scrollToPending()"></div>

<script>
const WORKER = 'https://saf-queue-worker.byker-software.workers.dev';
let SECRET = '', shops = [], selectedShopId = null;

function doLogin() {
  const s = document.getElementById('secret-input').value.trim();
  if (!s) return;
  SECRET = s;
  api('GET', '/admin/shops')
    .then(() => {
      localStorage.setItem('admin_secret', s);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dash').style.display         = 'block';
      loadAll();
    })
    .catch(() => {
      document.getElementById('login-err').textContent = 'Wrong secret. Try again.';
      SECRET = '';
    });
}

function doLogout() {
  localStorage.removeItem('admin_secret');
  SECRET = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dash').style.display         = 'none';
}

async function addLocation() {
  const city = document.getElementById('new-city-input').value.trim();
  const area = document.getElementById('new-area-input').value.trim();
  const msg  = document.getElementById('location-msg');
  if (!city && !area) { msg.style.color='var(--red)'; msg.textContent='Enter at least one field'; return; }
  try {
    const res  = await fetch(WORKER + '/admin/locations', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-admin-secret': SECRET },
      body: JSON.stringify({ city: city||null, area: area||null, country: 'Pakistan' })
    });
    const json = await res.json();
    msg.style.color = json.success ? 'var(--green)' : 'var(--red)';
    msg.textContent = json.success ? '✓ Added successfully' : (json.error || 'Error');
    if (json.success) { document.getElementById('new-city-input').value=''; document.getElementById('new-area-input').value=''; }
  } catch(e) { msg.style.color='var(--red)'; msg.textContent = e.message; }
}

function loadAll() { loadShops();
loadSupportSettings(); loadRegistrations(); }

async function loadShops() {
  document.getElementById('shop-list').innerHTML = '<div class="loading-row">Loading...</div>';
  try {
    const { data } = await api('GET', '/admin/shops');
    shops = data;
    const subs = await Promise.allSettled(shops.map(s => api('GET', `/subscriptions?shop_id=${s.id}`)));
    shops = shops.map((s, i) => ({ ...s, sub: subs[i].status === 'fulfilled' ? subs[i].value.data : null }));
    renderStats();
    renderShops();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    if (e.message?.includes('denied') || e.message?.includes('Unauthorized') || e.message?.includes('401')) {
      localStorage.removeItem('admin_secret');
      SECRET = '';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dash').style.display         = 'none';
      document.getElementById('login-err').textContent      = 'Session expired. Please login again.';
    } else {
      document.getElementById('shop-list').innerHTML = `<div class="empty-row">Error: ${e.message}</div>`;
    }
  }
}

function renderStats() {
  document.getElementById('s-total').textContent   = shops.length;
  document.getElementById('s-active').textContent  = shops.filter(s => s.is_active).length;
  document.getElementById('s-inactive').textContent= shops.filter(s => !s.is_active).length;
  document.getElementById('s-free').textContent    = shops.filter(s => !s.sub || s.sub.plan_name === 'free').length;
}

function renderShops() {
  const el = document.getElementById('shop-list');
  if (!shops.length) { el.innerHTML = '<div class="empty-row">No shops yet</div>'; return; }

  el.innerHTML = shops.map((s, i) => {
    const plan   = s.sub?.plan_name ?? 'free';
    const expiry = s.sub?.end_date  ?? '—';
    return `<div class="table-row" style="animation-delay:${i*.03}s">
      <div>
        <div class="shop-name">${esc(s.name)}</div>
        <div class="shop-detail">${esc(s.category||'')} ${s.area ? '· ' + esc(s.area) : ''}</div>
      </div>
      <div class="shop-phone">${esc(s.owner_phone)}</div>
      <div><span class="badge ${s.is_active ? 'active' : 'inactive'}">${s.is_active ? '● Active' : '● Inactive'}</span></div>
      <div><span class="badge ${plan}">${plan.toUpperCase()}</span></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)">${expiry}</div>
      <div class="action-group">
        <button class="btn-xs plan" data-id="${s.id}" data-name="${esc(s.name)}" onclick="openPlanModal(this.dataset.id,this.dataset.name)">Plan</button>
        <button class="btn-xs ${s.is_active ? 'off' : 'on'}" data-id="${s.id}" data-active="${!s.is_active}" onclick="toggleActive(this.dataset.id,this.dataset.active==='true')">${s.is_active ? 'Deactivate' : 'Activate'}</button>
        <button class="btn-xs link" data-id="${s.id}" data-name="${esc(s.name)}" onclick="copyLink(this.dataset.id,this.dataset.name)">🔗 Link</button>
        <button class="btn-xs link" data-id="${s.id}" onclick="shareWhatsApp(this.dataset.id)" style="background:rgba(37,211,102,0.15);border-color:rgba(37,211,102,0.4);color:#25d366">💬 WA</button>
        <button class="btn-xs link" data-id="${s.id}" data-name="${esc(s.name)}" onclick="downloadQR(this.dataset.id,this.dataset.name)" style="background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.3)">📱 QR</button>
        <button class="btn-xs" data-id="${s.id}" data-name="${esc(s.name)}" onclick="resetPin(this.dataset.id,this.dataset.name)" style="background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#FBBF24">🔑 PIN</button>
        <button class="btn-xs del" data-id="${s.id}" data-name="${esc(s.name)}" onclick="deleteShop(this.dataset.id,this.dataset.name)">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function addShop() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const pin   = document.getElementById('f-pin').value.trim();
  const cat   = document.getElementById('f-cat').value.trim();
  const area  = document.getElementById('f-area').value.trim();
  if (!name || !phone || !pin) return showToast('Name, phone and PIN are required', 'error');
  if (pin.length !== 4)        return showToast('PIN must be 4 digits', 'error');
  try {
    await api('POST', '/shops', { name, owner_phone: phone, pin, category: cat, area });
    showToast(`✅ ${name} added — 30-day free trial started`, 'success');
    ['f-name','f-phone','f-pin','f-cat','f-area'].forEach(id => document.getElementById(id).value = '');
    loadShops();
  } catch(e) { showToast(e.message, 'error'); }
}

function openPlanModal(id, name) {
  selectedShopId = id;
  document.getElementById('modal-shop-name').value = name;
  document.getElementById('plan-modal').classList.add('show');
}
function closePlanModal() { document.getElementById('plan-modal').classList.remove('show'); selectedShopId = null; }
function handlePlanOverlay(e) { if (e.target === document.getElementById('plan-modal')) closePlanModal(); }

async function confirmPlan() {
  const plan = document.getElementById('modal-plan').value;
  try {
    await api('POST', '/admin/assign-plan', { shop_id: selectedShopId, plan_name: plan });
    showToast(`✅ ${plan.toUpperCase()} plan assigned`, 'success');
    closePlanModal(); loadShops();
  } catch(e) { showToast(e.message, 'error'); }
}

async function toggleActive(id, state) {
  try {
    await api('PATCH', `/admin/shops/${id}/activate`, { is_active: state });
    showToast(state ? '✅ Shop activated' : '🔴 Shop deactivated', state ? 'success' : '');
    loadShops();
  } catch(e) { showToast(e.message, 'error'); }
}

async function copyLink(id, name) {
  try {
    const { data } = await api('GET', `/shops/${id}/share-link`);
    await navigator.clipboard?.writeText(data.link);
    showToast(`✅ Link copied: ${data.link}`, 'success');
  } catch(e) {
    // Fallback to basic URL
    const url = `${location.origin}/customer.html?shop=${id}`;
    navigator.clipboard?.writeText(url).catch(() => prompt('Copy this link:', url));
    showToast(`Link copied for ${name}`, 'success');
  }
}

async function shareWhatsApp(id) {
  try {
    const { data } = await api('GET', `/shops/${id}/share-link`);
    window.open(data.whatsapp_url, '_blank');
  } catch(e) { showToast(e.message, 'error'); }
}

async function downloadQR(id, name) {
  try {
    const { data } = await api('GET', `/shops/${id}/qr`);
    // Open QR in new tab so user can save it
    window.open(data.qr_url, '_blank');
    showToast(`QR code opened for ${name}`, 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

// ── Reset PIN ──────────────────────────────────────────────
async function resetPin(shopId, shopName) {
  const newPin = prompt(`Reset PIN for "${shopName}"\nEnter new 4-digit PIN:`);
  if (!newPin) return;
  if (!/^\d{4}$/.test(newPin)) { showToast('PIN must be 4 digits', 'error'); return; }
  try {
    const res  = await fetch(`${WORKER}/admin/shops/${shopId}/reset-pin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': SECRET },
      body: JSON.stringify({ new_pin: newPin })
    });
    const data = await res.json();
    if (data.success) showToast(`✅ PIN reset for ${shopName}`, 'success');
    else showToast(data.error || 'Failed', 'error');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// ── Support Settings ────────────────────────────────────────
async function loadSupportSettings() {
  try {
    const res  = await fetch(`${WORKER}/public/settings`);
    const {data} = await res.json();
    if (!data) return;
    document.getElementById('s-wa').value  = data.support_whatsapp || '';
    document.getElementById('s-email').value = data.support_email || '';
    document.getElementById('s-msg').value = data.support_message || '';
  } catch(e) {}
}

async function saveSupportSettings() {
  const wa  = document.getElementById('s-wa').value.trim();
  const em  = document.getElementById('s-email').value.trim();
  const msg = document.getElementById('s-msg').value.trim();
  try {
    const res = await fetch(`${WORKER}/admin/settings`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': SECRET },
      body: JSON.stringify({ support_whatsapp: wa, support_email: em, support_message: msg })
    });
    const data = await res.json();
    if (data.success) showToast('✅ Support settings saved', 'success');
    else showToast(data.error || 'Failed', 'error');
  } catch(e) { showToast('Error', 'error'); }
}

async function deleteShop(id, name) {
  if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  try {
    await api('DELETE', `/admin/shops/${id}`);
    showToast(`🗑 ${name} deleted`, 'success');
    loadShops();
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadRegistrations() {
  const el = document.getElementById('reg-list');
  const badge = document.getElementById('pending-badge');
  try {
    const { data } = await api('GET', '/admin/registrations');
    const pending = data.filter(r => r.status === 'pending');

    // Update badge + sync poll counter so first load doesn't trigger flash
    _lastPendingCount = pending.length;
    if (badge) badge.textContent = pending.length ? `(${pending.length})` : '';

    if (!pending.length) {
      el.innerHTML = '<div class="empty-row" style="padding:20px;text-align:center;color:var(--text2)">✅ No pending registrations</div>';
      return;
    }

    el.innerHTML = pending.map((r, i) => `
      <div style="background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.15);border-radius:12px;padding:14px 16px;margin-bottom:10px;animation:fadeIn .3s ease ${i*.05}s both">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--text)">${esc(r.name)}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(r.owner_phone)}</div>
          </div>
          <span style="font-size:10px;padding:3px 8px;border-radius:100px;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)">PENDING</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:11px">
          <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:6px 8px">
            <div style="color:var(--muted);margin-bottom:2px">Category</div>
            <div style="color:var(--text)">${esc(r.category||'—')}</div>
          </div>
          <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:6px 8px">
            <div style="color:var(--muted);margin-bottom:2px">City</div>
            <div style="color:var(--text)">${esc(r.city||'—')}</div>
          </div>
          <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:6px 8px">
            <div style="color:var(--muted);margin-bottom:2px">Area</div>
            <div style="color:var(--text)">${esc(r.area||'—')}</div>
          </div>
          <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:6px 8px">
            <div style="color:var(--muted);margin-bottom:2px">Token Mode</div>
            <div style="color:${r.token_mode==='paid'?'var(--gold)':'var(--green)'}">
              ${r.token_mode==='paid'?'💳 Paid':'🆓 Free'}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-xs on" style="flex:1;padding:9px;font-size:12px" onclick="approveReg('${r.id}')">✓ Approve</button>
          <button class="btn-xs del" style="flex:1;padding:9px;font-size:12px" onclick="rejectReg('${r.id}')">✗ Reject</button>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-row">Error: ${e.message}</div>`;
  }
}

async function approveReg(id) {
  try {
    await api('POST', `/admin/registrations/${id}/approve`);
    showToast('✅ Shop approved and registered', 'success');
    loadAll();
  } catch(e) { showToast(e.message, 'error'); }
}

async function rejectReg(id) {
  if (!confirm('Reject this registration request?')) return;
  try {
    await api('POST', `/admin/registrations/${id}/reject`);
    showToast('Registration rejected', '');
    loadRegistrations();
  } catch(e) { showToast(e.message, 'error'); }
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type':'application/json', 'x-admin-secret': SECRET }};
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(WORKER + path, opts);
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Request failed');
  return data;
}

function esc(s) { return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let toastT;
function scrollToPending() {
  const sec = document.getElementById('pending-section');
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.className = '', 3500);
}

document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Auto-poll for new registrations every 60s ─────────────────
let _lastPendingCount = 0;
let _regPollTimer     = null;
let _titleFlash       = null;

function startRegPolling() {
  if (_regPollTimer) return; // already running
  _regPollTimer = setInterval(async () => {
    try {
      const { data } = await api('GET', '/admin/registrations');
      const pending  = data.filter(r => r.status === 'pending');
      const count    = pending.length;
      const badge    = document.getElementById('pending-badge');

      if (badge) badge.textContent = count ? `(${count})` : '';

      // New registrations arrived since last check
      if (count > _lastPendingCount) {
        const diff = count - _lastPendingCount;
        showToast(`🔔 ${diff} new registration request${diff > 1 ? 's' : ''}`, 'success');
        // Flash tab title
        clearInterval(_titleFlash);
        let on = true;
        const orig = document.title;
        _titleFlash = setInterval(() => {
          document.title = on ? `🔔 (${count}) New Request — Admin` : orig;
          on = !on;
        }, 900);
        // Stop flashing after 15s
        setTimeout(() => {
          clearInterval(_titleFlash);
          document.title = `(${count}) Pending — Admin`;
        }, 15000);

        // Reload the list
        loadRegistrations();
      }
      _lastPendingCount = count;
    } catch(e) { /* silent — don't spam on network error */ }
  }, 60000); // every 60 seconds
}

function stopRegPolling() {
  clearInterval(_regPollTimer);
  _regPollTimer = null;
}

// Boot
(function boot() {
  const saved = localStorage.getItem('admin_secret');
  if (saved) {
    SECRET = saved;
    api('GET', '/admin/shops')
      .then(() => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dash').style.display         = 'block';
        startRegPolling();
        loadAll();
      })
      .catch(err => {
        localStorage.removeItem('admin_secret');
        SECRET = '';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('dash').style.display         = 'none';
        document.getElementById('login-err').textContent =
          err.message?.includes('denied') || err.message?.includes('Unauthorized')
            ? 'Session expired. Please login again.'
            : 'Could not connect: ' + (err.message || 'unknown error');
      });
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
})();

// ── Window exports ──
window.addLocation = addLocation;
window.addShop = addShop;
window.approveReg = approveReg;
window.closePlanModal = closePlanModal;
window.confirmPlan = confirmPlan;
window.copyLink = copyLink;
window.deleteShop = deleteShop;
window.doLogin = doLogin;
window.doLogout = doLogout;
window.downloadQR = downloadQR;
window.handlePlanOverlay = handlePlanOverlay;
window.loadAll = loadAll;
window.openPlanModal = openPlanModal;
window.rejectReg = rejectReg;
window.resetPin = resetPin;
window.shareWhatsApp = shareWhatsApp;
window.toggleActive    = toggleActive;
window.startRegPolling  = startRegPolling;
window.scrollToPending  = scrollToPending;
window.stopRegPolling  = stopRegPolling;
</script>
</body>
