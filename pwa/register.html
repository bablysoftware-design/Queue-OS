<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#050810"/>
<title>دکان رجسٹریشن — ویٹ میٹ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--void:#050810;--surface:#0d1424;--glass:rgba(13,20,36,.8);--border:rgba(212,175,55,.12);--gold:#D4AF37;--gold2:#F5C842;--gold3:#FFE066;--cyan:#00D4FF;--red:#FF4560;--green:#00E396;--text:#EDE8D0;--muted:rgba(237,232,208,.4);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Nastaliq Urdu',serif;background:var(--void);color:var(--text);min-height:100vh;direction:rtl;}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.holo-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(212,175,55,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.container{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:32px 20px 60px;}

.header{text-align:center;margin-bottom:36px;}
.orb{width:76px;height:76px;margin:0 auto 16px;position:relative;}
.orb::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,var(--gold),var(--cyan),var(--gold2),var(--cyan),var(--gold));animation:spin 3s linear infinite;filter:blur(1px);}
.orb-inner{position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1a2540,#050810);display:flex;align-items:center;justify-content:center;font-size:30px;z-index:1;}
@keyframes spin{to{transform:rotate(360deg);}}
h1{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;direction:ltr;margin-bottom:8px;}
.header p{font-size:13px;color:var(--muted);}

.card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:28px;backdrop-filter:blur(20px);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--cyan),var(--gold),transparent);}

.card-title{font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:22px;text-align:center;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.5px;}
.field input,.field select{width:100%;background:rgba(5,8,16,.6);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .3s,box-shadow .3s;direction:ltr;text-align:right;}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(212,175,55,.15);}
.field input::placeholder{color:var(--muted);}
.field select option{background:var(--surface);color:var(--text);}

.btn-gold{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));color:#050810;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(212,175,55,.3);margin-top:8px;}
.btn-gold:hover{transform:translateY(-2px);}
.btn-gold:disabled{opacity:.5;pointer-events:none;}

.success-box{text-align:center;padding:32px 20px;display:none;}
.success-box .icon{font-size:56px;margin-bottom:16px;animation:bounceIn .6s cubic-bezier(.16,1,.3,1);}
@keyframes bounceIn{from{transform:scale(0);}to{transform:scale(1);}}
.success-box h2{font-size:18px;font-weight:700;color:var(--green);margin-bottom:10px;}
.success-box p{font-size:13px;color:var(--muted);line-height:1.8;}

.err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

.plan-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.plan-card{background:rgba(5,8,16,.6);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.plan-card.selected{border-color:var(--gold);background:rgba(212,175,55,.08);}
.plan-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:6px;}
.plan-price{font-size:12px;color:var(--text);font-weight:600;}
.plan-days{font-size:10px;color:var(--muted);margin-top:3px;}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="holo-grid"></div>
<div class="container">

  <div class="header">
    <div class="orb"><div class="orb-inner">🏪</div></div>
    <h1 style="font-family:Orbitron,monospace;font-size:20px;font-weight:900;background:linear-gradient(135deg,#e8b84b,#c9a227);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0">WaitMate</h1>
    <p>اپنی دکان رجسٹر کریں اور 30 دن مفت استعمال کریں</p>
  </div>

  <div class="card" id="form-card">
    <div class="card-title">دکان رجسٹریشن</div>

    <div class="field">
      <label>دکان کا نام *</label>
      <input id="r-name" type="text" placeholder="مثال: علی باربر شاپ"/>
    </div>

    <div class="field">
      <label>واٹس ایپ نمبر *</label>
      <input id="r-phone" type="tel" placeholder="923001234567"/>
    </div>

    <div class="field">
      <label>4 ہندسہ پن (لاگ ان کے لیے) *</label>
      <input id="r-pin" type="number" placeholder="مثال: 1234" maxlength="4"/>
    </div>

    <!-- Category with autocomplete -->
    <div class="field" style="position:relative">
      <label>دکان کی قسم</label>
      <input id="r-cat" type="text" placeholder="مثال: barber, clinic..." autocomplete="off" oninput="suggestCats()"/>
      <div id="cat-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#0d1424;border:1px solid rgba(212,175,55,.3);border-radius:10px;z-index:50;max-height:160px;overflow-y:auto;margin-top:4px"></div>
    </div>

    <!-- Country -->
    <div class="field" style="position:relative">
      <label>ملک *</label>
      <input id="r-country" type="text" placeholder="مثال: Pakistan" autocomplete="off" oninput="suggestLocs('country')" value="Pakistan"/>
    </div>

    <!-- City with autocomplete -->
    <div class="field" style="position:relative">
      <label>شہر *</label>
      <input id="r-city" type="text" placeholder="مثال: Islamabad" autocomplete="off" oninput="suggestLocs('city')"/>
      <div id="city-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#0d1424;border:1px solid rgba(212,175,55,.3);border-radius:10px;z-index:50;max-height:160px;overflow-y:auto;margin-top:4px"></div>
    </div>

    <!-- Area -->
    <div class="field">
      <label>علاقہ</label>
      <input id="r-area" type="text" placeholder="مثال: صدر، بلیو ایریا"/>
    </div>

    <!-- Token Mode -->
    <div class="field">
      <label>ٹوکن موڈ</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <div id="mode-free" onclick="selectMode('free')"
          style="border:2px solid var(--gold);border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:rgba(212,175,55,.1)">
          <div style="font-size:18px">🆓</div>
          <div style="font-size:12px;font-weight:700;color:var(--gold);margin-top:4px">مفت</div>
          <div style="font-size:10px;color:var(--muted)">ٹوکن مفت</div>
        </div>
        <div id="mode-paid" onclick="selectMode('paid')"
          style="border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer">
          <div style="font-size:18px">💳</div>
          <div style="font-size:12px;font-weight:700;color:var(--muted);margin-top:4px">ادائیگی</div>
          <div style="font-size:10px;color:var(--muted)">ٹوکن فیس</div>
        </div>
      </div>
      <input type="hidden" id="r-mode" value="free"/>
      <div id="price-field" style="display:none;margin-top:8px">
        <input id="r-price" type="number" placeholder="ٹوکن قیمت (PKR)" min="1"/>
      </div>
    </div>

    <button class="btn-gold" id="reg-btn" onclick="submitReg()">رجسٹریشن درخواست دیں</button>
    <div class="err" id="reg-err"></div>
  </div>

  <div class="success-box" id="success-box">
    <div class="icon">✅</div>
    <h2>درخواست موصول ہو گئی!</h2>
    <p>
      آپ کی درخواست زیر غور ہے۔<br/>
      ایڈمن جلد منظوری دے گا۔<br/>
      منظوری کے بعد آپ <strong>queue-os.pages.dev</strong> پر لاگ ان کر سکتے ہیں۔<br/><br/>
      30 دن کا مفت ٹرائل خود بخود شروع ہو گا۔
    </p>
  </div>

</div>

<script>
const canvas=document.getElementById('particle-canvas'),ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function mkPt(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,vy:-(Math.random()*.4+.1),vx:(Math.random()-.5)*.2,a:Math.random()*.4+.1,c:Math.random()>.6?'#D4AF37':'#00D4FF'};}
function draw(){ctx.clearRect(0,0,W,H);pts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;if(p.y<-5){pts[i]=mkPt();pts[i].y=H+5;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill();});ctx.globalAlpha=1;requestAnimationFrame(draw);}
resize();pts=Array.from({length:60},mkPt);draw();window.addEventListener('resize',resize);

const WORKER='https://saf-queue-worker.byker-software.workers.dev';

// ── Token mode toggle ──────────────────────────────────────
function selectMode(mode) {
  document.getElementById('r-mode').value = mode;
  const free = document.getElementById('mode-free');
  const paid = document.getElementById('mode-paid');
  const pf   = document.getElementById('price-field');
  if (mode === 'free') {
    free.style.border = '2px solid var(--gold)';
    free.style.background = 'rgba(212,175,55,.1)';
    free.querySelector('div:nth-child(2)').style.color = 'var(--gold)';
    paid.style.border = '1px solid var(--border)';
    paid.style.background = 'transparent';
    paid.querySelector('div:nth-child(2)').style.color = 'var(--muted)';
    pf.style.display = 'none';
  } else {
    paid.style.border = '2px solid var(--gold)';
    paid.style.background = 'rgba(212,175,55,.1)';
    paid.querySelector('div:nth-child(2)').style.color = 'var(--gold)';
    free.style.border = '1px solid var(--border)';
    free.style.background = 'transparent';
    free.querySelector('div:nth-child(2)').style.color = 'var(--muted)';
    pf.style.display = 'block';
  }
}

// ── Autocomplete helpers ───────────────────────────────────
let _catTimer, _locTimer;

async function suggestCats() {
  clearTimeout(_catTimer);
  _catTimer = setTimeout(async () => {
    const q = document.getElementById('r-cat').value.trim();
    const box = document.getElementById('cat-suggestions');
    if (!q) { box.style.display='none'; return; }
    try {
      const res = await fetch(`${WORKER}/search/categories?q=${encodeURIComponent(q)}`);
      const { data } = await res.json();
      if (!data?.length) { box.style.display='none'; return; }
      box.innerHTML = data.map(c =>
        `<div onclick="pickCat('${c.name}')" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(212,175,55,.1)">${c.icon||'🏪'} ${c.name}</div>`
      ).join('');
      box.style.display = 'block';
    } catch(e) {}
  }, 300);
}

function pickCat(name) {
  document.getElementById('r-cat').value = name;
  document.getElementById('cat-suggestions').style.display = 'none';
}

async function suggestLocs(type) {
  clearTimeout(_locTimer);
  _locTimer = setTimeout(async () => {
    const q = document.getElementById(type==='city' ? 'r-city' : 'r-country').value.trim();
    const box = document.getElementById('city-suggestions');
    if (!q || type !== 'city') return;
    try {
      const res = await fetch(`${WORKER}/search/locations?q=${encodeURIComponent(q)}`);
      const { data } = await res.json();
      if (!data?.length) { box.style.display='none'; return; }
      const seen = new Set();
      const items = data.filter(l => {
        const k = l.city; if (seen.has(k)) return false; seen.add(k); return true;
      });
      box.innerHTML = items.map(l =>
        `<div onclick="pickCity('${l.city}','${l.country||"Pakistan"}')" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(212,175,55,.1)">📍 ${l.city}, ${l.country||''}</div>`
      ).join('');
      box.style.display = 'block';
    } catch(e) {}
  }, 300);
}

function pickCity(city, country) {
  document.getElementById('r-city').value = city;
  document.getElementById('r-country').value = country;
  document.getElementById('city-suggestions').style.display = 'none';
}

// ── Submit ─────────────────────────────────────────────────
async function submitReg(){
  const name    = document.getElementById('r-name').value.trim();
  const phone   = document.getElementById('r-phone').value.trim();
  const pin     = document.getElementById('r-pin').value.trim();
  const cat     = document.getElementById('r-cat').value.trim();
  const area    = document.getElementById('r-area').value.trim();
  const country = document.getElementById('r-country').value.trim();
  const city    = document.getElementById('r-city').value.trim();
  const mode    = document.getElementById('r-mode').value;
  const errEl   = document.getElementById('reg-err');
  const btn     = document.getElementById('reg-btn');
  errEl.textContent = '';

  if (!name)               return errEl.textContent='دکان کا نام ضروری ہے';
  if (!phone)              return errEl.textContent='فون نمبر ضروری ہے';
  if (!pin||pin.length!==4) return errEl.textContent='پن 4 ہندسوں کا ہونا چاہیے';
  if (!city)               return errEl.textContent='شہر ضروری ہے';

  btn.disabled=true; btn.textContent='...';
  try {
    const res = await fetch(`${WORKER}/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, owner_phone:phone, pin, category:cat, area, country, city, token_mode:mode })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('form-card').style.display='none';
      document.getElementById('success-box').style.display='block';
    } else {
      errEl.textContent = data.error||'خرابی';
      btn.disabled=false; btn.textContent='رجسٹریشن درخواست دیں';
    }
  } catch(e) {
    errEl.textContent = 'کنکشن خرابی';
    btn.disabled=false; btn.textContent='رجسٹریشن درخواست دیں';
  }
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#r-cat')) document.getElementById('cat-suggestions').style.display='none';
  if (!e.target.closest('#r-city')) document.getElementById('city-suggestions').style.display='none';
});
</script>
</body>
</html>
