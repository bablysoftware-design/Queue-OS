<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#050810"/>
<title>قطار میں شامل ہوں</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#050810;--surface:#0d1424;--glass:rgba(13,20,36,.8);
  --border:rgba(212,175,55,.12);--gold:#D4AF37;--gold2:#F5C842;
  --gold3:#FFE066;--cyan:#00D4FF;--red:#FF4560;--green:#00E396;
  --amber:#F59E0B;--text:#EDE8D0;--muted:rgba(237,232,208,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Nastaliq Urdu',serif;background:var(--void);color:var(--text);min-height:100dvh;direction:rtl;overflow-x:hidden;}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.holo-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(212,175,55,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,.035) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;animation:gridDrift 25s linear infinite;}
@keyframes gridDrift{to{background-position:50px 50px;}}
.wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:24px 20px 60px;min-height:100dvh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.page-header{text-align:center;padding:20px 0 28px;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both;}
.page-logo{font-size:44px;margin-bottom:8px;display:inline-block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.page-brand{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;direction:ltr;letter-spacing:2px;}

/* ── SHOP CARD ── */
.shop-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:18px;backdrop-filter:blur(20px);position:relative;overflow:hidden;animation:fadeUp .7s .1s cubic-bezier(.16,1,.3,1) both;}
.shop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),var(--cyan),transparent);}
.shop-name{font-size:20px;font-weight:700;color:var(--gold2);margin-bottom:6px;}
.shop-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
.shop-status{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid;}
.shop-status.open{background:rgba(0,227,150,.1);border-color:var(--green);color:var(--green);}
.shop-status.closed{background:rgba(255,69,96,.1);border-color:var(--red);color:var(--red);}
.status-dot{width:6px;height:6px;border-radius:50%;}
.shop-status.open .status-dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s ease-in-out infinite;}
.shop-status.closed .status-dot{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Live stats row */
.live-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
.live-stat{text-align:center;background:rgba(5,8,16,.4);border:1px solid var(--border);border-radius:12px;padding:12px 8px;}
.live-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--gold2);}
.live-lbl{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── JOIN FORM ── */
.join-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:24px;backdrop-filter:blur(20px);position:relative;overflow:hidden;animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) both;}
.join-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.join-title{font-size:16px;font-weight:700;color:var(--gold2);text-align:center;margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.5px;}
.field input{width:100%;background:rgba(5,8,16,.6);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .3s,box-shadow .3s;direction:ltr;text-align:right;}
.field input:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(212,175,55,.15);}
.field input::placeholder{color:var(--muted);}
.btn-gold{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));color:#050810;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(212,175,55,.3);}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(212,175,55,.5);}
.btn-gold:disabled{opacity:.5;pointer-events:none;}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

/* ── TOKEN RESULT (after joining) ── */
.token-result{display:none;text-align:center;animation:popIn .6s cubic-bezier(.16,1,.3,1) both;}
@keyframes popIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.token-result-card{background:var(--glass);border:1px solid rgba(212,175,55,.3);border-radius:24px;padding:32px 24px;backdrop-filter:blur(20px);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(212,175,55,.1);}
.token-result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--cyan),var(--gold),transparent);}
.result-label{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:'Orbitron',monospace;}
.big-token{font-family:'Orbitron',monospace;font-size:96px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;filter:drop-shadow(0 8px 24px rgba(212,175,55,.4));animation:numPulse 2s ease-in-out infinite;}
@keyframes numPulse{0%,100%{filter:drop-shadow(0 8px 24px rgba(212,175,55,.4));}50%{filter:drop-shadow(0 8px 36px rgba(212,175,55,.7));}}
.result-name{font-size:16px;color:var(--text);margin:8px 0 20px;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.result-stat{background:rgba(5,8,16,.5);border:1px solid var(--border);border-radius:12px;padding:14px;}
.result-stat .rv{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:var(--gold2);}
.result-stat .rl{font-size:10px;color:var(--muted);margin-top:4px;}

/* Live tracker */
.tracker{background:rgba(5,8,16,.5);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:4px;text-align:center;}
.tracker-title{font-size:10px;color:var(--gold);letter-spacing:1px;font-family:'Orbitron',monospace;margin-bottom:10px;direction:ltr;}
.tracker-status{font-size:14px;font-weight:600;padding:8px 16px;border-radius:100px;display:inline-block;border:1px solid;}
.tracker-status.waiting{background:rgba(212,175,55,.1);border-color:var(--gold);color:var(--gold);}
.tracker-status.called {background:rgba(0,227,150,.15);border-color:var(--green);color:var(--green);animation:calledPulse 1s ease-in-out infinite;}
.tracker-status.done   {background:rgba(100,116,139,.1);border-color:var(--muted);color:var(--muted);}
@keyframes calledPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,227,150,.3);}50%{box-shadow:0 0 0 8px rgba(0,227,150,0);}}

.refresh-note{font-size:10px;color:var(--muted);margin-top:10px;direction:ltr;}
.btn-share{width:100%;padding:13px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:12px;}
.btn-share:hover{border-color:var(--cyan);color:var(--cyan);}

/* Closed overlay */
.closed-msg{background:var(--glass);border:1px solid rgba(255,69,96,.2);border-radius:20px;padding:32px;text-align:center;backdrop-filter:blur(20px);animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) both;}
.closed-icon{font-size:48px;margin-bottom:12px;}
.closed-title{font-size:18px;font-weight:700;color:var(--red);margin-bottom:8px;}
.closed-sub{font-size:13px;color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.loading-state{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="holo-grid"></div>

<div class="wrap">

  <div class="page-header">
    <div class="page-logo">🏪</div>
    <div class="page-brand">SAF QUEUE</div>
  </div>

  <!-- Loading -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <div>لوڈ ہو رہا ہے...</div>
  </div>

  <!-- Shop info -->
  <div id="shop-section" style="display:none">
    <div class="shop-card">
      <div class="shop-name" id="s-name">—</div>
      <div class="shop-meta" id="s-meta">—</div>
      <div class="shop-status open" id="s-status">
        <span class="status-dot"></span>
        <span id="s-status-txt">کھلی ہے</span>
      </div>
      <div class="live-row">
        <div class="live-stat">
          <div class="live-val" id="s-current">—</div>
          <div class="live-lbl">ابھی نمبر</div>
        </div>
        <div class="live-stat">
          <div class="live-val" id="s-queue">—</div>
          <div class="live-lbl">قطار میں</div>
        </div>
        <div class="live-stat">
          <div class="live-val" id="s-wait">—</div>
          <div class="live-lbl">منٹ انتظار</div>
        </div>
      </div>
    </div>

    <!-- Join form -->
    <div class="join-card" id="join-section">
      <div class="join-title">قطار میں شامل ہوں</div>
      <div class="field">
        <label>آپ کا نام *</label>
        <input id="c-name" type="text" placeholder="نام درج کریں"/>
      </div>
      <div class="field">
        <label>فون نمبر (اختیاری)</label>
        <input id="c-phone" type="tel" placeholder="03001234567" dir="ltr"/>
      </div>
      <button class="btn-gold" id="join-btn" onclick="joinQueue()">
        ٹوکن لیں
      </button>
      <div class="err" id="join-err"></div>
    </div>

    <!-- Closed message -->
    <div class="closed-msg" id="closed-section" style="display:none">
      <div class="closed-icon">🔒</div>
      <div class="closed-title">دکان ابھی بند ہے</div>
      <div class="closed-sub" id="closed-name">—</div>
      <div class="closed-sub" style="margin-top:8px">براہ کرم کھلنے پر دوبارہ آئیں</div>
    </div>
  </div>

  <!-- Token result -->
  <div id="token-result" class="token-result">
    <div class="token-result-card">
      <div class="result-label">YOUR TOKEN</div>
      <div class="big-token" id="r-token">—</div>
      <div class="result-name">🎉 <span id="r-name">—</span>، آپ کی باری آئے گی!</div>

      <div class="result-stats">
        <div class="result-stat">
          <div class="rv" id="r-pos">—</div>
          <div class="rl">نمبر قطار میں</div>
        </div>
        <div class="result-stat">
          <div class="rv" id="r-wait">—</div>
          <div class="rl">منٹ انتظار</div>
        </div>
      </div>

      <!-- Live tracker -->
      <div class="tracker">
        <div class="tracker-title">LIVE STATUS</div>
        <div class="tracker-status waiting" id="tracker-badge">انتظار میں ہیں</div>
        <div class="refresh-note" id="tracker-detail">Auto refreshes every 15s</div>
      </div>

      <button class="btn-share" onclick="shareToken()">
        📤 دوستوں کو دکان کا لنک بھیجیں
      </button>
    </div>
  </div>

</div>

<script>
// Particles
const canvas=document.getElementById('particle-canvas'),ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function mkPt(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,vy:-(Math.random()*.4+.1),vx:(Math.random()-.5)*.2,a:Math.random()*.4+.1,c:Math.random()>.6?'#D4AF37':'#00D4FF'};}
function draw(){ctx.clearRect(0,0,W,H);pts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;if(p.y<-5){pts[i]=mkPt();pts[i].y=H+5;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.globalAlpha=p.a;ctx.fill();});ctx.globalAlpha=1;requestAnimationFrame(draw);}
resize();pts=Array.from({length:60},mkPt);draw();window.addEventListener('resize',resize);

const WORKER='https://saf-queue-worker.byker-software.workers.dev';
const params=new URLSearchParams(window.location.search);
const SHOP_ID=params.get('shop');

let shopData=null, myTokenId=null, myTokenNum=null, trackerTimer=null;

// ── Load shop ──────────────────────────────────────────────
async function loadShop(){
  if(!SHOP_ID){
    document.getElementById('loading-state').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">غلط لنک — shop ID نہیں ملی</div>';
    return;
  }
  try{
    const res=await fetch(`${WORKER}/public/shop/${SHOP_ID}`);
    const {data}=await res.json();
    shopData=data;
    renderShop(data);
  }catch(e){
    document.getElementById('loading-state').innerHTML='<div style="color:var(--red);padding:40px;text-align:center">دکان نہیں ملی</div>';
  }
}

function renderShop(d){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('shop-section').style.display='block';
  document.getElementById('s-name').textContent=d.name;
  document.getElementById('s-meta').textContent=`${d.category||''} ${d.area?'— '+d.area:''}`.trim();
  document.getElementById('s-current').textContent=d.current_serving??'—';
  document.getElementById('s-queue').textContent=d.queue_length;
  document.getElementById('s-wait').textContent=d.estimated_wait;
  document.title=`${d.name} — قطار`;

  if(d.is_open && d.is_active){
    document.getElementById('s-status').className='shop-status open';
    document.getElementById('s-status-txt').textContent='کھلی ہے ✓';
    document.getElementById('join-section').style.display='block';
    document.getElementById('closed-section').style.display='none';
  }else{
    document.getElementById('s-status').className='shop-status closed';
    document.getElementById('s-status-txt').textContent='بند ہے';
    document.getElementById('join-section').style.display='none';
    document.getElementById('closed-section').style.display='block';
    document.getElementById('closed-name').textContent=d.name;
  }
}

// ── Join queue ─────────────────────────────────────────────
async function joinQueue(){
  const name=document.getElementById('c-name').value.trim();
  const phone=document.getElementById('c-phone').value.trim();
  const errEl=document.getElementById('join-err');
  const btn=document.getElementById('join-btn');
  errEl.textContent='';

  if(!name){errEl.textContent='نام ضروری ہے';return;}

  btn.disabled=true;btn.textContent='...';
  try{
    const res=await fetch(`${WORKER}/public/join`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shop_id:SHOP_ID,customer_name:name,customer_phone:phone||null})
    });
    const {data,success,error}=await res.json();
    if(!success)throw new Error(error);

    myTokenId=data.token_id;
    myTokenNum=data.token_number;

    // Show result
    document.getElementById('shop-section').style.display='none';
    const resultEl=document.getElementById('token-result');
    resultEl.style.display='block';

    document.getElementById('r-token').textContent=data.token_number;
    document.getElementById('r-name').textContent=name;
    document.getElementById('r-pos').textContent=data.position;
    document.getElementById('r-wait').textContent=data.estimated_wait+'m';

    // Save to session
    sessionStorage.setItem('saf_token_id',data.token_id);
    sessionStorage.setItem('saf_token_num',data.token_number);
    sessionStorage.setItem('saf_customer_name',name);
    sessionStorage.setItem('saf_shop_id',SHOP_ID);

    startTracker();

  }catch(e){
    errEl.textContent=e.message||'خرابی';
    btn.disabled=false;btn.textContent='ٹوکن لیں';
  }
}

// ── Live tracker ───────────────────────────────────────────
function startTracker(){
  updateTracker();
  trackerTimer=setInterval(updateTracker,15000);
}

async function updateTracker(){
  if(!myTokenId||!SHOP_ID)return;
  try{
    const res=await fetch(`${WORKER}/public/position?shop_id=${SHOP_ID}&token_id=${myTokenId}`);
    const {data}=await res.json();

    const badge=document.getElementById('tracker-badge');
    const detail=document.getElementById('tracker-detail');

    if(data.status==='called'){
      badge.className='tracker-status called';
      badge.textContent='🔔 آپ کی باری آ گئی!';
      detail.textContent='ابھی آئیں!';
      clearInterval(trackerTimer);
      // Vibrate if supported
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
    }else if(data.status==='completed'){
      badge.className='tracker-status done';
      badge.textContent='✅ مکمل';
      detail.textContent='آپ کی سروس ہو گئی';
      clearInterval(trackerTimer);
    }else if(data.status==='waiting'){
      badge.className='tracker-status waiting';
      badge.textContent=`انتظار — نمبر ${data.position}`;
      detail.textContent=`آگے ${data.people_ahead} لوگ | ~${data.estimated_wait} منٹ`;
      document.getElementById('r-pos').textContent=data.position;
      document.getElementById('r-wait').textContent=data.estimated_wait+'m';
    }
  }catch(e){}
}

// ── Share ──────────────────────────────────────────────────
function shareToken(){
  const url=`${location.origin}/join.html?shop=${SHOP_ID}`;
  if(navigator.share){
    navigator.share({title:`${shopData?.name||'دکان'} قطار`,text:`${shopData?.name||'دکان'} میں آن لائن ٹوکن لیں`,url});
  }else{
    navigator.clipboard.writeText(url).then(()=>alert('لنک کاپی ہو گیا!\n'+url));
  }
}

// ── Boot ───────────────────────────────────────────────────
(function boot(){
  // Resume tracking if returning to page
  const tid=sessionStorage.getItem('saf_token_id');
  const tnum=sessionStorage.getItem('saf_token_num');
  const tname=sessionStorage.getItem('saf_customer_name');
  const tsid=sessionStorage.getItem('saf_shop_id');

  if(tid&&tsid===SHOP_ID){
    myTokenId=tid;myTokenNum=tnum;
    document.getElementById('loading-state').style.display='none';
    document.getElementById('token-result').style.display='block';
    document.getElementById('r-token').textContent=tnum;
    document.getElementById('r-name').textContent=tname||'—';
    startTracker();
    return;
  }

  loadShop();
  // Refresh shop stats every 30s
  setInterval(async()=>{
    if(!SHOP_ID||myTokenId)return;
    try{
      const res=await fetch(`${WORKER}/public/shop/${SHOP_ID}`);
      const {data}=await res.json();
      document.getElementById('s-current').textContent=data.current_serving??'—';
      document.getElementById('s-queue').textContent=data.queue_length;
      document.getElementById('s-wait').textContent=data.estimated_wait;
    }catch(e){}
  },30000);
})();
</script>
</body>
</html>
