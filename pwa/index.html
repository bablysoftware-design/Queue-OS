<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#050810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<title>سف کیو</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Void Black × Liquid Gold
═══════════════════════════════════════════════ */
:root {
  --void:    #050810;
  --deep:    #080d1a;
  --surface: #0d1424;
  --glass:   rgba(13,20,36,0.7);
  --border:  rgba(212,175,55,0.12);
  --gold:    #D4AF37;
  --gold2:   #F5C842;
  --gold3:   #FFE066;
  --cyan:    #00D4FF;
  --red:     #FF4560;
  --green:   #00E396;
  --text:    #EDE8D0;
  --muted:   rgba(237,232,208,0.4);
  --r:       18px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html { height:100%; }

body {
  font-family: 'Noto Nastaliq Urdu', serif;
  background: var(--void);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  direction: rtl;
}

/* ── Particle canvas background ── */
#particle-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Holographic grid ── */
.holo-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  animation: gridDrift 20s linear infinite;
}

@keyframes gridDrift {
  0%   { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

/* ── App shell ── */
#app { position: relative; z-index: 1; }

.screen { display: none; min-height: 100dvh; }
.screen.active { display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════ */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 40px;
  perspective: 1000px;
}

/* ── 3D Logo ── */
.logo-3d {
  text-align: center;
  animation: floatIn 1s cubic-bezier(0.16,1,0.3,1) both;
}

.logo-orb {
  width: 90px; height: 90px;
  margin: 0 auto 20px;
  position: relative;
  transform-style: preserve-3d;
  animation: orbFloat 4s ease-in-out infinite;
}

.logo-orb::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--gold), var(--cyan), var(--gold2), var(--cyan), var(--gold));
  animation: spin 3s linear infinite;
  filter: blur(1px);
}

.logo-orb-inner {
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #1a2540, #050810);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  z-index: 1;
  box-shadow: inset 0 0 30px rgba(212,175,55,0.1);
}

.logo-orb-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes spin       { to { transform: rotate(360deg); } }
@keyframes orbFloat   { 0%,100% { transform: translateY(0) rotateX(0); } 50% { transform: translateY(-10px) rotateX(5deg); } }
@keyframes glowPulse  { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
@keyframes floatIn    { from { opacity:0; transform: translateY(30px) rotateX(20deg); } to { opacity:1; transform: translateY(0) rotateX(0); } }

.logo-title {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--gold), var(--gold3), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
  direction: ltr;
}

.logo-sub {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ── Login Card ── */
.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 32px 28px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  animation: cardRise 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
  transform-style: preserve-3d;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--cyan), var(--gold), transparent);
  animation: shimmer 3s linear infinite;
}

.login-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% -20%, rgba(212,175,55,0.08), transparent 60%);
  pointer-events: none;
}

@keyframes cardRise   { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform: translateY(0); } }
@keyframes shimmer    { 0% { background-position: -200%; } 100% { background-position: 200%; } }

.card-heading {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold2);
  margin-bottom: 24px;
  text-align: center;
}

/* ── Fields ── */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.field input {
  width: 100%;
  background: rgba(5,8,16,0.6);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  direction: ltr;
  text-align: right;
}
.field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(212,175,55,0.15);
}
.field input::placeholder { color: var(--muted); }

/* ── Gold Button ── */
.btn-gold {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold3));
  color: #050810;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: btnGlow 3s ease-in-out infinite;
}

.btn-gold::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
  transform: rotate(45deg) translateX(-100%);
  transition: transform 0.6s;
}

.btn-gold:hover::before { transform: rotate(45deg) translateX(100%); }
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(212,175,55,0.4); }
.btn-gold:active { transform: translateY(0); }
.btn-gold:disabled { opacity: 0.5; pointer-events: none; }

@keyframes btnGlow {
  0%,100% { box-shadow: 0 6px 24px rgba(212,175,55,0.2); }
  50%      { box-shadow: 0 6px 32px rgba(212,175,55,0.45); }
}

.err-msg {
  color: var(--red);
  font-size: 12px;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
#dash-screen { background: var(--void); }

/* ── Top Bar ── */
.topbar {
  padding: calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(5,8,16,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-gem {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px rgba(212,175,55,0.3);
  animation: gemPulse 3s ease-in-out infinite;
}

@keyframes gemPulse {
  0%,100% { box-shadow: 0 0 16px rgba(212,175,55,0.3); }
  50%      { box-shadow: 0 0 28px rgba(212,175,55,0.6); }
}

.topbar-name { font-size: 14px; font-weight: 700; color: var(--text); }
.topbar-plan { font-size: 10px; color: var(--gold); letter-spacing: 0.5px; }

/* ── Status pill ── */
.status-pill {
  padding: 7px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
}

.status-pill.open {
  background: rgba(0,227,150,0.1);
  border-color: var(--green);
  color: var(--green);
  box-shadow: 0 0 20px rgba(0,227,150,0.15);
}

.status-pill.closed {
  background: rgba(255,69,96,0.1);
  border-color: var(--red);
  color: var(--red);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}
.status-pill.open  .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: dotBlink 1.5s ease-in-out infinite; }
.status-pill.closed .status-dot { background: var(--red); }

@keyframes dotBlink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* ── Body ── */
.dash-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Token 3D Hero ── */
.token-hero {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 32px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transform-style: preserve-3d;
}

.token-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.token-hero::after {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(212,175,55,0.1), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.token-label {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.token-3d-wrap {
  perspective: 600px;
  display: inline-block;
  margin-bottom: 12px;
}

.token-num {
  font-family: 'Orbitron', monospace;
  font-size: 88px;
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, var(--gold), var(--gold3), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: inline-block;
  transform: perspective(300px) rotateX(8deg);
  filter: drop-shadow(0 8px 24px rgba(212,175,55,0.4));
  animation: numFloat 3s ease-in-out infinite;
}

.token-num.empty {
  font-size: 40px;
  opacity: 0.3;
  animation: none;
  transform: none;
  filter: none;
  background: none;
  -webkit-text-fill-color: var(--muted);
}

@keyframes numFloat {
  0%,100% { transform: perspective(300px) rotateX(8deg) translateY(0); }
  50%      { transform: perspective(300px) rotateX(8deg) translateY(-6px); }
}

.token-phone {
  font-size: 12px;
  color: var(--muted);
  direction: ltr;
  margin-bottom: 20px;
}

/* Next button */
.next-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 36px;
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #050810;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 32px rgba(212,175,55,0.3);
}

.next-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 16px 40px rgba(212,175,55,0.5); }
.next-btn:active { transform: scale(0.98); }
.next-btn:disabled { opacity: 0.4; pointer-events: none; }

.next-btn .arrow {
  font-size: 18px;
  transition: transform 0.2s;
}
.next-btn:hover .arrow { transform: translateX(-4px); }

/* ── Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.stat-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(16px);
  transition: transform 0.3s, box-shadow 0.3s;
}

.stat-card:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 12px 40px rgba(212,175,55,0.1);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  opacity: 0.5;
}

.stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 34px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-key {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ── Subscription Card ── */
.sub-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
}

.sub-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,175,55,0.04), transparent);
}

.sub-plan-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.sub-expiry {
  font-size: 11px;
  color: var(--muted);
  direction: ltr;
  text-align: right;
}

.sub-icon {
  font-size: 28px;
  animation: gemFloat 3s ease-in-out infinite;
}

@keyframes gemFloat { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-4px) rotate(5deg); } }

/* ── Section ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── Queue List ── */
.queue-list { display: flex; flex-direction: column; gap: 8px; }

.queue-item {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  backdrop-filter: blur(12px);
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  animation: itemSlide 0.4s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
  overflow: hidden;
}

.queue-item::before {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 3px; height: 100%;
  background: linear-gradient(180deg, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.queue-item:hover {
  border-color: rgba(212,175,55,0.3);
  transform: translateX(-4px);
  box-shadow: 4px 0 20px rgba(212,175,55,0.08);
}

.queue-item:hover::before { opacity: 1; }

@keyframes itemSlide { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

.q-num {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold2);
  min-width: 44px;
  text-align: center;
}

.q-phone {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
  direction: ltr;
  text-align: right;
}

.q-badge {
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid;
}

.q-badge.waiting { background: rgba(212,175,55,0.1); border-color: var(--gold); color: var(--gold); }
.q-badge.called  { background: rgba(0,212,255,0.1);  border-color: var(--cyan); color: var(--cyan); }

.empty-queue {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
  background: var(--glass);
  border: 1px dashed var(--border);
  border-radius: var(--r);
  backdrop-filter: blur(10px);
}

/* ── Bottom Bar ── */
.bottombar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px calc(env(safe-area-inset-bottom,0px) + 12px);
  background: rgba(5,8,16,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.btn-outline {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-outline:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(212,175,55,0.05);
}

/* ── Toast ── */
#toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { color: var(--green); border-color: var(--green); box-shadow: 0 8px 40px rgba(0,227,150,0.2); }
#toast.error   { color: var(--red);   border-color: var(--red);   box-shadow: 0 8px 40px rgba(255,69,96,0.2); }

/* ── Admin Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.show { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 20px;
  padding: 30px 26px;
  width: 100%;
  max-width: 360px;
  position: relative;
  animation: modalIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}

.modal-box::before {
  content: '';
  position: absolute;
  top: 0; left: 30px; right: 30px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

@keyframes modalIn { from { opacity:0; transform: scale(0.9) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.modal-title {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
}

.modal-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 30px; height: 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* ── PWA Install Banner ── */
.install-banner {
  display: none;
  position: fixed;
  bottom: 80px; left: 16px; right: 16px;
  background: var(--surface);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px;
  padding: 16px 18px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 990;
  box-shadow: 0 8px 40px rgba(212,175,55,0.15);
  animation: bannerUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes bannerUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div class="holo-grid"></div>

<div id="app">

<!-- ══════════════════════════════
     لاگ ان اسکرین
══════════════════════════════ -->
<div id="login-screen" class="screen active">

  <div class="logo-3d" id="logo-tap" onclick="handleLogoTap()">
    <div class="logo-orb">
      <div class="logo-orb-glow"></div>
      <div class="logo-orb-inner">🏪</div>
    </div>
    <div class="logo-title">SAF QUEUE</div>
    <div class="logo-sub">سمارٹ قطار انتظام</div>
  </div>

  <div class="login-card">
    <div class="card-heading">دکان لاگ ان</div>

    <div class="field">
      <label>واٹس ایپ نمبر</label>
      <input id="login-phone" type="tel" placeholder="923001234567"/>
    </div>

    <div class="field">
      <label>چار ہندسہ پن</label>
      <input id="login-pin" type="password" maxlength="4" placeholder="••••"/>
    </div>

    <button class="btn-gold" id="login-btn" onclick="handleLogin()">
      داخل ہوں
    </button>
    <div class="err-msg" id="login-error"></div>
  </div>
</div>

<!-- ══════════════════════════════
     ڈیش بورڈ
══════════════════════════════ -->
<div id="dash-screen" class="screen">

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-gem">🏪</div>
      <div>
        <div class="topbar-name" id="shop-name-top">دکان</div>
        <div class="topbar-plan" id="shop-plan-top">لوڈ ہو رہا ہے...</div>
      </div>
    </div>
    <div class="status-pill closed" id="status-pill" onclick="toggleOpen()">
      <span class="status-dot"></span>
      <span id="status-txt">بند</span>
    </div>
  </div>

  <div class="dash-body">

    <!-- ٹوکن ہیرو -->
    <div class="token-hero">
      <div class="token-label">ابھی چل رہا ہے</div>
      <div class="token-3d-wrap">
        <div class="token-num empty" id="token-display">—</div>
      </div>
      <div class="token-phone" id="token-phone"></div>
      <button class="next-btn" id="next-btn" onclick="callNext()">
        <span class="arrow">←</span>
        اگلا ٹوکن
      </button>
    </div>

    <!-- اعداد و شمار -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-waiting">0</div>
        <div class="stat-key">قطار میں</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-today">0</div>
        <div class="stat-key">آج سروس کیے</div>
      </div>
    </div>

    <!-- سبسکرپشن -->
    <div class="sub-card">
      <div>
        <div class="sub-plan-name" id="sub-plan">—</div>
        <div class="sub-expiry" id="sub-expiry">لوڈ ہو رہا ہے</div>
      </div>
      <div class="sub-icon">💎</div>
    </div>

    <!-- قطار فہرست -->
    <div>
      <div class="section-head">
        <span class="section-label">قطار فہرست</span>
        <span class="section-label" id="queue-count">0 لوگ</span>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="empty-queue">قطار خالی ہے 🎉</div>
      </div>
    </div>

  </div>

  <div class="bottombar">
    <button class="btn-outline" onclick="refreshQueue()">🔄 تازہ کریں</button>
    <button class="btn-outline" onclick="handleLogout()">باہر جائیں</button>
  </div>
</div>

</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<!-- Admin Modal -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">⚡ ADMIN</span>
      <button class="modal-close" onclick="closeAdminModal()">✕</button>
    </div>
    <div class="field">
      <label>ایڈمن سیکرٹ</label>
      <input id="admin-secret-input" type="password" placeholder="خفیہ کوڈ"/>
    </div>
    <button class="btn-gold" onclick="adminModalLogin()">ایڈمن لاگ ان</button>
    <div class="err-msg" id="admin-modal-err"></div>
  </div>
</div>

<!-- Install Banner -->
<div class="install-banner" id="install-banner">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:26px">📲</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">ایپ انسٹال کریں</div>
      <div style="font-size:11px;color:var(--muted)">ہوم اسکرین پر شامل کریں</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button onclick="installApp()" class="btn-gold" style="width:auto;padding:9px 18px;font-size:12px">انسٹال</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" class="modal-close">✕</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function createParticle() {
  return {
    x:     Math.random() * W,
    y:     Math.random() * H,
    r:     Math.random() * 1.5 + 0.3,
    vx:    (Math.random() - 0.5) * 0.3,
    vy:    -(Math.random() * 0.5 + 0.1),
    alpha: Math.random() * 0.5 + 0.1,
    color: Math.random() > 0.6 ? '#D4AF37' : '#00D4FF',
  };
}

function initParticles() {
  resizeCanvas();
  particles = Array.from({length: 80}, createParticle);
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -5) { particles[i] = createParticle(); particles[i].y = H + 5; }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', resizeCanvas);
initParticles();
animateParticles();

// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const WORKER = 'https://saf-queue-worker.byker-software.workers.dev';

let state = {
  shopId: null, shopName: null, isOpen: false, refreshTimer: null
};

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function handleLogin() {
  const phone = document.getElementById('login-phone').value.trim();
  const pin   = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.textContent = '';

  if (!phone || !pin) { errEl.textContent = 'نمبر اور پن دونوں ضروری ہیں'; return; }

  btn.disabled = true;
  btn.textContent = '...';

  api('POST', '/shops/login', { owner_phone: phone, pin })
    .then(({ data }) => {
      localStorage.setItem('saf_shop_id',   data.shop_id);
      localStorage.setItem('saf_shop_name', data.shop_name);
      localStorage.setItem('saf_is_open',   data.is_open ? '1' : '0');
      state.shopId = data.shop_id;
      state.shopName = data.shop_name;
      state.isOpen = data.is_open;
      showDashboard();
    })
    .catch(err => {
      errEl.textContent = err.message || 'لاگ ان ناکام';
      btn.disabled = false;
      btn.textContent = 'داخل ہوں';
    });
}

function handleLogout() {
  localStorage.clear();
  clearInterval(state.refreshTimer);
  document.getElementById('login-phone').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'داخل ہوں';
  showScreen('login-screen');
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function showDashboard() {
  document.getElementById('shop-name-top').textContent = state.shopName;
  showScreen('dash-screen');
  updateStatusPill(state.isOpen);
  loadSubscription();
  refreshQueue();
  clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(refreshQueue, 15000);
}

function refreshQueue() {
  api('GET', `/tokens/queue?shop_id=${state.shopId}`)
    .then(({ data }) => {
      const { currentlyServing, queue, queueLength } = data;
      const numEl = document.getElementById('token-display');

      if (currentlyServing) {
        numEl.className = 'token-num';
        numEl.textContent = currentlyServing.token_number;
        document.getElementById('token-phone').textContent = maskPhone(currentlyServing.customer_phone);
      } else {
        numEl.className = 'token-num empty';
        numEl.textContent = '—';
        document.getElementById('token-phone').textContent = '';
      }

      document.getElementById('stat-waiting').textContent  = queueLength;
      document.getElementById('stat-today').textContent    = data.shop?.current_token ?? '—';
      document.getElementById('queue-count').textContent   = `${queueLength} لوگ`;

      const listEl = document.getElementById('queue-list');
      if (!queue.length) {
        listEl.innerHTML = '<div class="empty-queue">قطار خالی ہے 🎉</div>';
      } else {
        listEl.innerHTML = queue.map((t, i) => `
          <div class="queue-item" style="animation-delay:${i*0.05}s">
            <span class="q-num">#${t.token_number}</span>
            <span class="q-phone">${maskPhone(t.customer_phone)}</span>
            <span class="q-badge waiting">انتظار</span>
          </div>`).join('');
      }
    })
    .catch(() => {});
}

function callNext() {
  const btn = document.getElementById('next-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳';

  api('POST', '/tokens/next', { shop_id: state.shopId })
    .then(({ data }) => {
      showToast(data.empty ? 'قطار خالی ہے!' : `ٹوکن #${data.next.token_number} بلا لیا گیا`, 'success');
      refreshQueue();
    })
    .catch(err => showToast(err.message, 'error'))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<span class="arrow">←</span> اگلا ٹوکن';
    });
}

function toggleOpen() {
  const newState = !state.isOpen;
  api('PATCH', `/shops/${state.shopId}/toggle`, { is_open: newState })
    .then(() => {
      state.isOpen = newState;
      localStorage.setItem('saf_is_open', newState ? '1' : '0');
      updateStatusPill(newState);
      showToast(newState ? '✅ دکان کھل گئی!' : '🔴 دکان بند ہو گئی', newState ? 'success' : '');
    })
    .catch(err => showToast(err.message, 'error'));
}

function updateStatusPill(isOpen) {
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-txt');
  pill.className = `status-pill ${isOpen ? 'open' : 'closed'}`;
  txt.textContent = isOpen ? 'کھلی' : 'بند';
}

function loadSubscription() {
  api('GET', `/subscriptions?shop_id=${state.shopId}`)
    .then(({ data }) => {
      document.getElementById('sub-plan').textContent   = (data.plan_name || 'free').toUpperCase() + ' PLAN';
      document.getElementById('sub-expiry').textContent = data.end_date;
      document.getElementById('shop-plan-top').textContent = `${data.plan_name} — ${data.end_date}`;
    })
    .catch(() => {});
}

// ═══════════════════════════════════════
// ADMIN — 3 TAPS
// ═══════════════════════════════════════
let tapCount = 0, tapTimer = null;

function handleLogoTap() {
  tapCount++;
  clearTimeout(tapTimer);
  if (tapCount >= 3) {
    tapCount = 0;
    document.getElementById('admin-modal').classList.add('show');
    setTimeout(() => document.getElementById('admin-secret-input').focus(), 300);
    return;
  }
  tapTimer = setTimeout(() => tapCount = 0, 1500);
}

function closeAdminModal() {
  document.getElementById('admin-modal').classList.remove('show');
}

function adminModalLogin() {
  const secret = document.getElementById('admin-secret-input').value.trim();
  const errEl  = document.getElementById('admin-modal-err');
  if (!secret) return;
  errEl.textContent = '';

  fetch(`${WORKER}/admin/shops`, {
    headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret }
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem('admin_secret', secret);
      closeAdminModal();
      window.location.href = '/admin.html';
    } else {
      errEl.textContent = 'غلط سیکرٹ';
    }
  })
  .catch(() => errEl.textContent = 'کنکشن خرابی');
}

document.getElementById('admin-secret-input')
  .addEventListener('keydown', e => { if (e.key === 'Enter') adminModalLogin(); });

// ═══════════════════════════════════════
// PWA INSTALL
// ═══════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => {
      document.getElementById('install-banner').style.display = 'flex';
    }, 4000);
  }
});

function installApp() {
  if (!deferredPrompt) {
    alert('آئی فون پر: سفاری میں شیئر بٹن → "Add to Home Screen"');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  showToast('✅ ایپ انسٹال ہو گئی!', 'success');
});

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(WORKER + path, opts);
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'خرابی');
  return data;
}

function maskPhone(p) {
  if (!p) return '—';
  const s = String(p);
  return s.slice(0,4) + '****' + s.slice(-3);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
(function boot() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  }

  const shopId   = localStorage.getItem('saf_shop_id');
  const shopName = localStorage.getItem('saf_shop_name');
  const isOpen   = localStorage.getItem('saf_is_open') === '1';

  if (shopId && shopName) {
    state.shopId   = shopId;
    state.shopName = shopName;
    state.isOpen   = isOpen;
    showDashboard();
  }

  document.getElementById('login-pin')
    .addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
})();
</script>
</body>
</html>
