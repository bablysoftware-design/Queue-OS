<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080c14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<title>Saf Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #080c14;
  --bg2:     #0d1422;
  --surface: #111827;
  --glass:   rgba(17,24,39,0.7);
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --gold:    #E8B84B;
  --gold2:   #F5CC6A;
  --gold3:   #FDE68A;
  --cyan:    #38BDF8;
  --green:   #34D399;
  --red:     #F87171;
  --amber:   #FBBF24;
  --text:    #F1F5F9;
  --text2:   #94A3B8;
  --text3:   #475569;
  --r:       14px;
  --font:    'Sora', sans-serif;
}

[dir="rtl"] { --font: 'Noto Nastaliq Urdu', serif; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Mesh background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,184,75,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(56,189,248,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Subtle grid ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; }
.screen { display: none; min-height: 100dvh; }
.screen.active { display: flex; flex-direction: column; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 28px;
}

/* Language toggle pill */
.lang-pill {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 6px 14px;
  border: 1px solid var(--border2);
  border-radius: 100px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  color: var(--text2);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 100;
  letter-spacing: 0.02em;
}
.lang-pill:hover { border-color: var(--gold); color: var(--gold); }

/* Logo block */
.logo-block {
  text-align: center;
  animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.logo-mark {
  width: 64px;
  height: 64px;
  margin: 0 auto 16px;
  position: relative;
}

.logo-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
  background: linear-gradient(135deg, var(--gold), var(--cyan)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: spin 8s linear infinite;
}

.logo-inner {
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a2438, #0d1422);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.logo-name {
  font-family: 'Sora', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--text) 30%, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 5px;
}

.logo-tagline {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* Login card */
.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.6;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  letter-spacing: -0.01em;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 7px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 400;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  direction: ltr;
}

.field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(232,184,75,0.1);
}

.field input::placeholder { color: var(--text3); }

.btn-primary {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0d1422;
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.01em;
  margin-top: 4px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,184,75,0.3); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; pointer-events: none; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
  color: var(--text3);
  font-size: 12px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.btn-customer {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-customer:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(56,189,248,0.05); }

.err-msg {
  color: var(--red);
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
}

/* ══════════════════════════════════════
   DASHBOARD SCREEN
══════════════════════════════════════ */
.topbar {
  padding: calc(env(safe-area-inset-top,0px) + 12px) 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8,12,20,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-left { display: flex; align-items: center; gap: 12px; }

.topbar-badge {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(232,184,75,0.2), rgba(232,184,75,0.05));
  border: 1px solid rgba(232,184,75,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.topbar-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.topbar-sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }

.topbar-right { display: flex; align-items: center; gap: 8px; }

.status-toggle {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: 100px;
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid;
}
.status-toggle.open  { background: rgba(52,211,153,0.1); border-color: var(--green); color: var(--green); }
.status-toggle.closed{ background: rgba(248,113,113,0.1); border-color: var(--red); color: var(--red); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-toggle.open  .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s ease-in-out infinite; }
.status-toggle.closed .status-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.topbar-lang {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.topbar-lang:hover { border-color: var(--border2); color: var(--text); }

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.dash-body { flex: 1; overflow-y: auto; padding: 16px 16px 90px; display: flex; flex-direction: column; gap: 12px; }
.tab-panel { display: none; flex-direction: column; gap: 12px; }
.tab-panel.active { display: flex; }

/* ── Cards ── */
.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
}

.card-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
  font-family: 'Sora', sans-serif;
}

/* Token hero */
.token-hero {
  text-align: center;
  padding: 28px 16px 22px;
}
.token-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}

.token-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 80px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.token-number.serving {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: tokenGlow 2s ease-in-out infinite;
}

.token-number.empty { color: var(--text3); font-size: 42px; }

@keyframes tokenGlow {
  0%,100% { filter: drop-shadow(0 0 20px rgba(232,184,75,0.3)); }
  50%      { filter: drop-shadow(0 0 36px rgba(232,184,75,0.6)); }
}

.token-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; font-family: 'JetBrains Mono', monospace; }

.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

.btn-next {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 24px;
  border: none;
  border-radius: 100px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0d1422;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(232,184,75,0.25);
}
.btn-next:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,184,75,0.4); }
.btn-next:disabled { opacity: 0.4; pointer-events: none; }

.btn-noshow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 20px;
  border: 1px solid var(--border2);
  border-radius: 100px;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-noshow:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.06); }
.btn-noshow:disabled { opacity: 0.4; pointer-events: none; }

/* Stats */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
  margin-bottom: 5px;
}
.stat-key { font-size: 11px; color: var(--text2); font-weight: 500; }

/* Manual token */
.manual-row { display: flex; gap: 8px; }
.manual-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  direction: ltr;
}
.manual-input:focus { border-color: var(--gold); }
.manual-input::placeholder { color: var(--text3); }

.btn-add {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: var(--gold);
  color: #0d1422;
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-add:hover { background: var(--gold2); }

/* Sub banner */
.sub-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.sub-plan { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }
.sub-date { font-size: 11px; color: var(--text2); }

/* Queue list */
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.sec-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Sora', sans-serif; }

.queue-list { display: flex; flex-direction: column; gap: 6px; }

.q-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all 0.2s;
  animation: slideIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.q-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.05); }
@keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }

.q-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--gold); min-width: 36px; }
.q-name { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; }
.q-phone { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.q-badge { padding: 3px 9px; border-radius: 100px; font-size: 10px; font-weight: 600; border: 1px solid; letter-spacing: 0.04em; font-family: 'Sora', sans-serif; }
.q-badge.waiting { background: rgba(251,191,36,0.1); border-color: var(--amber); color: var(--amber); }
.q-badge.called  { background: rgba(56,189,248,0.1); border-color: var(--cyan); color: var(--cyan); }

.queue-empty {
  text-align: center;
  padding: 32px;
  background: rgba(255,255,255,0.02);
  border: 1px dashed var(--border);
  border-radius: 12px;
  color: var(--text3);
  font-size: 13px;
}

/* Reports */
.report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.report-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.report-val { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 600; line-height: 1; margin-bottom: 6px; }
.report-lbl { font-size: 11px; color: var(--text2); font-weight: 500; }
.report-card.served  .report-val { color: var(--green); }
.report-card.noshow  .report-val { color: var(--red); }
.report-card.waiting .report-val { color: var(--amber); }
.report-card.total   .report-val { color: var(--cyan); }

/* Settings panel */
.settings-panel { display: none; }
.settings-section { margin-bottom: 16px; }
.settings-section-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); font-family: 'Sora', sans-serif; }
.settings-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 12px; }
.settings-field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.settings-field input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 11px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  outline: none;
  direction: ltr;
  transition: border-color 0.2s;
}
.settings-field input:focus { border-color: var(--gold); }
.settings-actions { display: flex; gap: 8px; }
.btn-save { flex: 1; padding: 10px; border: none; border-radius: 8px; background: var(--gold); color: #0d1422; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-save:hover { background: var(--gold2); }
.btn-ghost-sm { padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text2); font-family: 'Sora', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn-ghost-sm:hover { border-color: var(--border2); color: var(--text); }
.pin-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; margin-top: 4px; }
.pin-msg { font-size: 11px; text-align: center; min-height: 16px; margin-top: 6px; }

/* Bottom bar */
.bottombar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(env(safe-area-inset-bottom,0px) + 10px);
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
}

.bar-btn {
  flex: 1;
  padding: 10px 6px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--text2);
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.bar-btn:hover { border-color: var(--border2); color: var(--text); }
.bar-btn.active { border-color: rgba(232,184,75,0.3); color: var(--gold); background: rgba(232,184,75,0.05); }
.bar-icon { font-size: 16px; }

/* Toast */
#toast {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Sora', sans-serif;
  z-index: 999;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  max-width: 90vw;
  text-align: center;
  white-space: normal;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { color: var(--green); border-color: rgba(52,211,153,0.3); }
#toast.error   { color: var(--red);   border-color: rgba(248,113,113,0.3); }

/* Admin modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 24px 22px 32px;
  width: 100%;
  max-width: 460px;
  animation: sheetUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
}
.modal-sheet::before { content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 36px; height: 4px; border-radius: 100px; background: var(--border2); }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 18px; margin-top: 12px; font-family: 'Sora', sans-serif; letter-spacing: -0.01em; }
.modal-close { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* Install banner */
.install-banner { display: none; position: fixed; bottom: 80px; left: 12px; right: 12px; background: var(--bg2); border: 1px solid rgba(232,184,75,0.25); border-radius: 14px; padding: 14px 16px; align-items: center; justify-content: space-between; gap: 12px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

/* Animations */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>
<div id="app">

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen" class="screen active">
  <button class="lang-pill" onclick="toggleLang()" id="login-lang-btn">اردو</button>

  <div class="logo-block" id="logo-tap" onclick="handleLogoTap()">
    <div class="logo-mark">
      <div class="logo-ring"></div>
      <div class="logo-inner">🏪</div>
    </div>
    <div class="logo-name">Saf Queue</div>
    <div class="logo-tagline" id="login-tagline">Smart Queue Management</div>
  </div>

  <div class="login-card">
    <div class="card-title" id="login-title">Shopkeeper Login</div>

    <div class="field">
      <label id="lbl-phone">WhatsApp Number</label>
      <input id="login-phone" type="tel" placeholder="923001234567" autocomplete="tel"/>
    </div>

    <div class="field">
      <label id="lbl-pin">4-Digit PIN</label>
      <input id="login-pin" type="password" maxlength="4" placeholder="••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    <div class="err-msg" id="login-error"></div>

    <div class="divider" id="login-divider">— or —</div>
    <button class="btn-customer" onclick="window.location.href='/customer.html'">
      <span>🛍</span>
      <span id="cust-btn-txt">I'm a Customer — Get Token</span>
    </button>
  </div>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div id="dash-screen" class="screen">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-badge">🏪</div>
      <div>
        <div class="topbar-name" id="shop-name-top">—</div>
        <div class="topbar-sub" id="shop-sub-top">Loading...</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-lang" onclick="toggleLang()" id="dash-lang-btn">اردو</button>
      <button class="status-toggle closed" id="status-toggle" onclick="toggleOpen()">
        <span class="status-dot"></span>
        <span id="status-txt">Closed</span>
      </button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-queue-btn" onclick="switchTab('queue')">Queue</button>
    <button class="tab" id="tab-reports-btn" onclick="switchTab('reports')">Reports</button>
  </div>

  <div class="dash-body">

    <!-- Queue tab -->
    <div class="tab-panel active" id="tab-queue">

      <!-- Token hero -->
      <div class="card token-hero">
        <div class="card-label" id="lbl-current-token">CURRENTLY SERVING</div>
        <div class="token-number empty" id="token-display">—</div>
        <div class="token-sub" id="token-phone-display"></div>
        <div class="btn-row">
          <button class="btn-next" id="next-btn" onclick="callNext()">▶ Next Customer</button>
          <button class="btn-noshow" id="noshow-btn" onclick="handleNoShow()">✗ No Show</button>
        </div>
      </div>

      <!-- Manual token -->
      <div class="card">
        <div class="card-label" id="lbl-manual">ADD WALK-IN</div>
        <div class="manual-row">
          <input class="manual-input" id="manual-phone" type="tel" placeholder="Phone number (optional)" dir="ltr"/>
          <button class="btn-add" id="add-btn" onclick="addManualToken()">Add</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="stat-waiting">0</div>
          <div class="stat-key" id="lbl-in-queue">In Queue</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-today">0</div>
          <div class="stat-key" id="lbl-served-today">Served Today</div>
        </div>
      </div>

      <!-- Subscription -->
      <div class="card">
        <div class="sub-banner">
          <div>
            <div class="sub-plan" id="sub-plan-display">—</div>
            <div class="sub-date" id="sub-date-display">—</div>
          </div>
          <div style="font-size:22px">💎</div>
        </div>
      </div>

      <!-- Queue list -->
      <div>
        <div class="sec-head">
          <span class="sec-label" id="lbl-queue">QUEUE</span>
          <span class="sec-label" id="queue-count-display">0 people</span>
        </div>
        <div class="queue-list" id="queue-list">
          <div class="queue-empty" id="queue-empty-msg">Queue is empty 🎉</div>
        </div>
      </div>

    </div><!-- /tab-queue -->

    <!-- Reports tab -->
    <div class="tab-panel" id="tab-reports">
      <div class="report-grid">
        <div class="report-card served" ><div class="report-val" id="r-served">—</div><div class="report-lbl" id="lbl-served">Served</div></div>
        <div class="report-card noshow" ><div class="report-val" id="r-noshow">—</div><div class="report-lbl" id="lbl-noshow">No Shows</div></div>
        <div class="report-card waiting"><div class="report-val" id="r-waiting">—</div><div class="report-lbl" id="lbl-waiting">Waiting</div></div>
        <div class="report-card total"  ><div class="report-val" id="r-total">—</div><div class="report-lbl" id="lbl-total">Total Today</div></div>
      </div>
      <div class="card" style="margin-top:4px">
        <div class="sub-banner">
          <div>
            <div class="sub-plan" id="sub-plan-r">—</div>
            <div class="sub-date" id="sub-date-r">—</div>
          </div>
          <div style="font-size:22px">💎</div>
        </div>
      </div>
      <button class="btn-primary" id="refresh-report-btn" onclick="loadStats()">Refresh Report</button>
    </div>

    <!-- Settings (shown/hidden) -->
    <div class="card settings-panel" id="settings-panel">
      <div class="settings-section">
        <div class="settings-section-title" id="lbl-settings-title">Settings</div>
        <div class="settings-row">
          <div class="settings-field">
            <label id="lbl-open-time">Opening Time</label>
            <input id="s-open" type="time" value="09:00"/>
          </div>
          <div class="settings-field">
            <label id="lbl-close-time">Closing Time</label>
            <input id="s-close" type="time" value="21:00"/>
          </div>
          <div class="settings-field">
            <label id="lbl-per-cust">Mins / Customer</label>
            <input id="s-avg" type="number" min="1" max="120" value="10"/>
          </div>
        </div>
        <div class="settings-actions">
          <button class="btn-save" id="save-btn" onclick="saveSettings()">Save</button>
          <button class="btn-ghost-sm" id="close-settings-btn" onclick="toggleSettings()">Close</button>
        </div>
      </div>

      <div class="settings-section" style="margin-bottom:0">
        <div class="settings-section-title" id="lbl-change-pin">Change PIN</div>
        <div class="pin-row">
          <div class="settings-field">
            <label id="lbl-cur-pin">Current PIN</label>
            <input id="s-cur-pin" type="password" maxlength="4" style="text-align:center;letter-spacing:4px"/>
          </div>
          <div class="settings-field">
            <label id="lbl-new-pin">New PIN</label>
            <input id="s-new-pin" type="password" maxlength="4" style="text-align:center;letter-spacing:4px"/>
          </div>
          <div class="settings-field">
            <label>&nbsp;</label>
            <button class="btn-save" id="pin-btn" onclick="changePin()">Change</button>
          </div>
        </div>
        <div class="pin-msg" id="pin-msg"></div>
      </div>
    </div>

  </div><!-- /dash-body -->

  <div class="bottombar">
    <button class="bar-btn" onclick="refreshQueue()"><span class="bar-icon">↺</span><span id="bar-refresh">Refresh</span></button>
    <button class="bar-btn" onclick="shareShopLink()"><span class="bar-icon">🔗</span><span id="bar-share">Share</span></button>
    <button class="bar-btn" onclick="toggleSettings()"><span class="bar-icon">⚙</span><span id="bar-settings">Settings</span></button>
    <button class="bar-btn" onclick="handleLogout()"><span class="bar-icon">→</span><span id="bar-logout">Logout</span></button>
  </div>

</div><!-- /dash-screen -->

</div><!-- /app -->

<div id="toast"></div>

<!-- Admin modal -->
<div class="modal-overlay" id="admin-modal" onclick="handleAdminOverlay(event)">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeAdminModal()">✕</button>
    <div class="modal-title" id="modal-admin-title">Admin Access</div>
    <div class="field">
      <label id="lbl-admin-secret">Admin Secret</label>
      <input id="admin-secret-input" type="password" placeholder="Enter admin secret" autocomplete="off"/>
    </div>
    <button class="btn-primary" id="admin-login-btn" onclick="adminModalLogin()">Login as Admin</button>
    <div class="err-msg" id="admin-modal-err"></div>
  </div>
</div>

<!-- Install banner -->
<div class="install-banner" id="install-banner">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:24px">📲</span>
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--text)" id="install-title">Install App</div>
      <div style="font-size:11px;color:var(--text2)" id="install-sub">Add to your home screen</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button onclick="installApp()" class="btn-add" id="install-btn">Install</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" class="modal-close">✕</button>
  </div>
</div>

<script src="/i18n.js"></script>
<script>

const WORKER = 'https://saf-queue-worker.byker-software.workers.dev';

let state = {
  shopId:       null,
  shopName:     null,
  isOpen:       false,
  refreshTimer: null,
  sessionToken: null,
};

// ── Apply language ────────────────────────────────────────────
function applyLanguage() {
  applyDir();
  const lang = getLang();
  const isUr = lang === 'ur';

  // Login screen
  document.getElementById('login-lang-btn').textContent = t('langSwitch');
  document.getElementById('login-tagline').textContent  = t('appTagline');
  document.getElementById('login-title').textContent    = t('shopLogin');
  document.getElementById('lbl-phone').textContent      = t('whatsappNum');
  document.getElementById('lbl-pin').textContent        = t('pin');
  document.getElementById('login-btn').textContent      = t('loginBtn');
  document.getElementById('login-divider').textContent  = t('orCustomer');
  document.getElementById('cust-btn-txt').textContent   = t('customerBtn');

  // Dashboard
  document.getElementById('dash-lang-btn').textContent      = t('langSwitch');
  document.getElementById('tab-queue-btn').textContent      = t('queueTab');
  document.getElementById('tab-reports-btn').textContent    = t('reportsTab');
  document.getElementById('lbl-current-token').textContent  = t('currentToken');
  document.getElementById('next-btn').innerHTML             = `▶ ${t('nextToken')}`;
  document.getElementById('noshow-btn').innerHTML           = `✗ ${t('noShow')}`;
  document.getElementById('lbl-manual').textContent         = t('manualToken');
  document.getElementById('manual-phone').placeholder       = t('phoneOptional');
  document.getElementById('add-btn').textContent            = t('addBtn');
  document.getElementById('lbl-in-queue').textContent       = t('queueIn');
  document.getElementById('lbl-served-today').textContent   = t('servedToday');
  document.getElementById('lbl-queue').textContent          = t('queueList');
  document.getElementById('lbl-served').textContent         = t('servedLabel');
  document.getElementById('lbl-noshow').textContent         = t('noShowLabel');
  document.getElementById('lbl-waiting').textContent        = t('waitingLabel');
  document.getElementById('lbl-total').textContent          = t('totalLabel');
  document.getElementById('refresh-report-btn').textContent = t('refreshReport');
  document.getElementById('lbl-settings-title').textContent = t('settingsTitle');
  document.getElementById('lbl-open-time').textContent      = t('openingTime');
  document.getElementById('lbl-close-time').textContent     = t('closingTime');
  document.getElementById('lbl-per-cust').textContent       = t('perCustomer');
  document.getElementById('save-btn').textContent           = t('saveSettings');
  document.getElementById('close-settings-btn').textContent = t('close');
  document.getElementById('lbl-change-pin').textContent     = t('changePin');
  document.getElementById('lbl-cur-pin').textContent        = t('currentPin');
  document.getElementById('lbl-new-pin').textContent        = t('newPin');
  document.getElementById('pin-btn').textContent            = t('changePinBtn');
  document.getElementById('bar-refresh').textContent        = t('refresh');
  document.getElementById('bar-share').textContent          = t('shareLink');
  document.getElementById('bar-settings').textContent       = t('settings');
  document.getElementById('bar-logout').textContent         = t('logout');
  document.getElementById('modal-admin-title').textContent  = t('adminAccess');
  document.getElementById('lbl-admin-secret').textContent   = t('adminSecret');
  document.getElementById('admin-login-btn').textContent    = t('adminLogin');
  document.getElementById('install-title').textContent      = t('appName') + ' App';
  document.getElementById('install-sub').textContent        = t('installSub') || 'Add to home screen';

  // Status text
  updateStatusToggle(state.isOpen);
}

// ── Auth ──────────────────────────────────────────────────────
function handleLogin() {
  const phone = document.getElementById('login-phone').value.trim();
  const pin   = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!phone || !pin) { errEl.textContent = t('loginError'); return; }
  btn.disabled = true;
  btn.textContent = t('loggingIn');

  api('POST', '/shops/login', { owner_phone: phone, pin })
    .then(({ data }) => {
      localStorage.setItem('saf_shop_id',       data.shop_id);
      localStorage.setItem('saf_shop_name',     data.shop_name);
      localStorage.setItem('saf_is_open',       data.is_open ? '1' : '0');
      localStorage.setItem('saf_session_token', data.session_token);
      state.shopId       = data.shop_id;
      state.shopName     = data.shop_name;
      state.isOpen       = data.is_open;
      state.sessionToken = data.session_token;
      showDashboard();
    })
    .catch(err => {
      errEl.textContent = err.message || t('loginFailed');
      btn.disabled = false;
      btn.textContent = t('loginBtn');
    });
}
window.handleLogin = handleLogin;

function handleLogout() {
  localStorage.removeItem('saf_shop_id');
  localStorage.removeItem('saf_shop_name');
  localStorage.removeItem('saf_is_open');
  localStorage.removeItem('saf_session_token');
  clearInterval(state.refreshTimer);
  state = { shopId:null, shopName:null, isOpen:false, refreshTimer:null, sessionToken:null };
  document.getElementById('login-phone').value = '';
  document.getElementById('login-pin').value   = '';
  document.getElementById('login-btn').disabled    = false;
  document.getElementById('login-btn').textContent = t('loginBtn');
  showScreen('login-screen');
}
window.handleLogout = handleLogout;

// ── Dashboard ─────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('shop-name-top').textContent = state.shopName;
  document.getElementById('shop-sub-top').textContent  = t('loading');
  showScreen('dash-screen');
  updateStatusToggle(state.isOpen);
  loadSubscription();
  refreshQueue();
  loadStats();
  clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(refreshQueue, 15000);
}

function switchTab(name) {
  ['queue','reports'].forEach(n => {
    document.getElementById(`tab-${n}-btn`).classList.toggle('active', n === name);
    document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
  });
  if (name === 'reports') loadStats();
}
window.switchTab = switchTab;

function refreshQueue() {
  api('GET', `/tokens/queue?shop_id=${state.shopId}`)
    .then(({ data }) => {
      const { currentlyServing, queue, queueLength } = data;
      const numEl = document.getElementById('token-display');

      if (currentlyServing) {
        numEl.className = 'token-number serving';
        numEl.textContent = currentlyServing.token_number;
        const nameOrPhone = currentlyServing.customer_name || maskPhone(currentlyServing.customer_phone);
        document.getElementById('token-phone-display').textContent = nameOrPhone;
      } else {
        numEl.className = 'token-number empty';
        numEl.textContent = '—';
        document.getElementById('token-phone-display').textContent = '';
      }

      document.getElementById('stat-waiting').textContent = queueLength;
      document.getElementById('stat-today').textContent   = data.shop?.current_token ?? '—';
      document.getElementById('queue-count-display').textContent = `${queueLength} ${t('people')}`;

      const listEl = document.getElementById('queue-list');
      if (!queue.length) {
        listEl.innerHTML = `<div class="queue-empty">${t('queueEmpty')}</div>`;
      } else {
        listEl.innerHTML = queue.map((item, i) => `
          <div class="q-item" style="animation-delay:${i * 0.04}s">
            <span class="q-num">#${item.token_number}</span>
            <span class="q-name">${esc(item.customer_name || '—')}</span>
            <span class="q-phone">${maskPhone(item.customer_phone)}</span>
            <span class="q-badge waiting">Waiting</span>
          </div>`).join('');
      }
    })
    .catch(() => {});
}
window.refreshQueue = refreshQueue;

function callNext() {
  const btn = document.getElementById('next-btn');
  btn.disabled = true;
  btn.textContent = '...';
  api('POST', '/tokens/next', { shop_id: state.shopId })
    .then(({ data }) => {
      showToast(data.empty ? t('queueEmptyMsg') : t('tokenCalled', data.next?.token_number), data.empty ? '' : 'success');
      refreshQueue(); loadStats();
    })
    .catch(err => showToast(err.message, 'error'))
    .finally(() => { btn.disabled = false; btn.innerHTML = `▶ ${t('nextToken')}`; });
}
window.callNext = callNext;

function handleNoShow() {
  const btn = document.getElementById('noshow-btn');
  btn.disabled = true;
  api('POST', '/tokens/no-show', { shop_id: state.shopId })
    .then(() => { showToast(t('noShowDone'), 'success'); refreshQueue(); loadStats(); })
    .catch(err => showToast(err.message, 'error'))
    .finally(() => { btn.disabled = false; });
}
window.handleNoShow = handleNoShow;

function addManualToken() {
  const phone = document.getElementById('manual-phone').value.trim() || `walkin-${Date.now()}`;
  api('POST', '/tokens', { shop_id: state.shopId, customer_phone: phone })
    .then(({ data }) => {
      showToast(t('tokenAdded', data.token.token_number), 'success');
      document.getElementById('manual-phone').value = '';
      refreshQueue();
    })
    .catch(err => showToast(err.message, 'error'));
}
window.addManualToken = addManualToken;

function toggleOpen() {
  const newState = !state.isOpen;
  api('PATCH', `/shops/${state.shopId}/toggle`, { is_open: newState })
    .then(() => {
      state.isOpen = newState;
      localStorage.setItem('saf_is_open', newState ? '1' : '0');
      updateStatusToggle(newState);
      showToast(newState ? t('shopOpen') : t('shopClosed'), newState ? 'success' : '');
    })
    .catch(err => showToast(err.message, 'error'));
}
window.toggleOpen = toggleOpen;

function updateStatusToggle(isOpen) {
  const btn = document.getElementById('status-toggle');
  document.getElementById('status-txt').textContent = isOpen ? t('open') : t('closed');
  btn.className = `status-toggle ${isOpen ? 'open' : 'closed'}`;
}

function loadSubscription() {
  api('GET', `/subscriptions?shop_id=${state.shopId}`)
    .then(({ data }) => {
      const plan = (data.plan_name || 'free').toUpperCase();
      document.getElementById('sub-plan-display').textContent = plan;
      document.getElementById('sub-date-display').textContent = `${t('expiry')}: ${data.end_date}`;
      document.getElementById('sub-plan-r').textContent       = plan;
      document.getElementById('sub-date-r').textContent       = `${t('expiry')}: ${data.end_date}`;
      document.getElementById('shop-sub-top').textContent     = `${plan} · ${data.end_date}`;
    }).catch(() => {});
}

function loadStats() {
  ['r-served','r-noshow','r-waiting','r-total'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.textContent === '—') el.style.opacity = '0.4';
  });
  api('GET', `/tokens/stats?shop_id=${state.shopId}`)
    .then(({ data }) => {
      const set = (id, val) => { const el = document.getElementById(id); if(el){ el.textContent = val ?? 0; el.style.opacity = '1'; }};
      set('r-served',  data.served);
      set('r-noshow',  data.no_show);
      set('r-waiting', data.waiting);
      set('r-total',   data.total);
    }).catch(() => {});
}
window.loadStats = loadStats;

function shareShopLink() {
  const url = `${location.origin}/customer.html?shop=${state.shopId}`;
  if (navigator.share) { navigator.share({ title: state.shopName, url }); }
  else { navigator.clipboard.writeText(url).then(() => showToast(t('linkCopied'), 'success')).catch(() => prompt('Copy link:', url)); }
}
window.shareShopLink = shareShopLink;

// ── Settings ──────────────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const show  = panel.style.display !== 'block';
  panel.style.display = show ? 'block' : 'none';
  if (show) {
    api('GET', `/shops/${state.shopId}`)
      .then(({ data }) => {
        if (data.opening_time)          document.getElementById('s-open').value  = data.opening_time;
        if (data.closing_time)          document.getElementById('s-close').value = data.closing_time;
        if (data.avg_service_time_mins) document.getElementById('s-avg').value   = data.avg_service_time_mins;
      }).catch(() => {});
  }
}
window.toggleSettings = toggleSettings;

async function saveSettings() {
  try {
    await api('PATCH', `/shops/${state.shopId}/settings`, {
      opening_time:          document.getElementById('s-open').value,
      closing_time:          document.getElementById('s-close').value,
      avg_service_time_mins: parseInt(document.getElementById('s-avg').value, 10),
    });
    showToast(t('settingsSaved'), 'success');
    document.getElementById('settings-panel').style.display = 'none';
  } catch(e) { showToast(e.message, 'error'); }
}
window.saveSettings = saveSettings;

async function changePin() {
  const cur = document.getElementById('s-cur-pin').value.trim();
  const nw  = document.getElementById('s-new-pin').value.trim();
  const msg = document.getElementById('pin-msg');
  msg.textContent = '';
  if (!cur || !nw)  { msg.style.color = 'var(--red)'; msg.textContent = t('pinRequired'); return; }
  if (nw.length !== 4) { msg.style.color = 'var(--red)'; msg.textContent = t('pinInvalid'); return; }
  try {
    await api('POST', `/shops/${state.shopId}/change-pin`, { current_pin: cur, new_pin: nw });
    msg.style.color = 'var(--green)'; msg.textContent = t('pinChanged');
    document.getElementById('s-cur-pin').value = '';
    document.getElementById('s-new-pin').value = '';
  } catch(e) { msg.style.color = 'var(--red)'; msg.textContent = e.message; }
}
window.changePin = changePin;

// ── Admin (3-tap) ─────────────────────────────────────────────
let tapCount = 0, tapTimer = null;
function handleLogoTap() {
  tapCount++;
  clearTimeout(tapTimer);
  if (tapCount >= 3) { tapCount = 0; openAdminModal(); return; }
  tapTimer = setTimeout(() => tapCount = 0, 1500);
}
window.handleLogoTap = handleLogoTap;

function openAdminModal() {
  document.getElementById('admin-modal').classList.add('show');
  document.getElementById('admin-modal-err').textContent = '';
  document.getElementById('admin-secret-input').value = '';
  setTimeout(() => document.getElementById('admin-secret-input').focus(), 300);
}

function closeAdminModal() { document.getElementById('admin-modal').classList.remove('show'); }
window.closeAdminModal = closeAdminModal;

function handleAdminOverlay(e) { if (e.target === document.getElementById('admin-modal')) closeAdminModal(); }
window.handleAdminOverlay = handleAdminOverlay;

function adminModalLogin() {
  const secret = document.getElementById('admin-secret-input').value.trim();
  const errEl  = document.getElementById('admin-modal-err');
  if (!secret) return;
  errEl.textContent = '';
  fetch(`${WORKER}/admin/shops`, { headers: { 'Content-Type':'application/json', 'x-admin-secret': secret }})
    .then(r => r.json())
    .then(d => {
      if (d.success) { localStorage.setItem('admin_secret', secret); closeAdminModal(); window.location.href = '/admin.html'; }
      else { errEl.textContent = t('wrongSecret'); }
    })
    .catch(() => { errEl.textContent = t('connError'); });
}
window.adminModalLogin = adminModalLogin;

document.getElementById('admin-secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') adminModalLogin(); });

// ── PWA Install ───────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => document.getElementById('install-banner').style.display = 'flex', 5000);
  }
});
function installApp() {
  if (!deferredPrompt) { alert('On iPhone: Share → "Add to Home Screen"'); return; }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('install-banner').style.display = 'none'; });
}
window.installApp = installApp;

// ── Helpers ───────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.sessionToken) headers['x-session-token'] = state.sessionToken;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(WORKER + path, opts);
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Something went wrong');
  return data;
}

function maskPhone(p) { if (!p) return '—'; const s = String(p); return s.length > 7 ? s.slice(0,4) + '****' + s.slice(-3) : s; }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
let toastT;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.className = '', 3500);
}

// ── Boot ──────────────────────────────────────────────────────
(function boot() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(() => {});

  applyLanguage();

  const id  = localStorage.getItem('saf_shop_id');
  const nm  = localStorage.getItem('saf_shop_name');
  const op  = localStorage.getItem('saf_is_open') === '1';
  const tok = localStorage.getItem('saf_session_token');

  if (id && nm && tok) {
    state.shopId       = id;
    state.shopName     = nm;
    state.isOpen       = op;
    state.sessionToken = tok;
    showDashboard();
  } else {
    localStorage.clear();
  }

  document.getElementById('login-pin').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
})();
</script>
